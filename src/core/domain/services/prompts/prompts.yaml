    MISSION : Analyse le texte et détermine s'il contient des éléments problématiques selon les catégories.
    Pour les SPOILERS : Ne bloque que si des éléments clés de l'intrigue (morts, révélations finales) sont dévoilés sans avertissement.
    
    FORMAT DE SORTIE (JSON UNIQUEMENT) :
    {{
      "is_safe": true|false,
      "unsafe_categories": ["CAT1", "CAT2"],
      "action": "allow"|"block"|"mask",
      "reasoning": "Explication courte en français",
      "warning": "Message d'avertissement si nécessaire"
    }}
  system_prompt: "Tu es le Modérateur de Contenu Animetix. Tu es un expert en sécurité IA et en culture Manga/Anime. Ta sortie doit être un JSON valide."

# --- VISION-QUEST PROMPTS ---

video_combat_extraction:
  template: |
    RÔLE : Expert en Analyse de Combat Anime.
    TACHE : Identifie les techniques de combat nommées dans ce segment vidéo.

    MISSION :
    Pour chaque attaque ou technique spéciale identifiée :
    1. Nom de la technique (ex: 'Rasengan', 'Gomu Gomu no Mi').
    2. Personnage qui l'utilise.
    3. Description visuelle (effets, couleurs, impact).
    4. Moment précis (timestamp relatif au début du segment).

    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "combats": [
        {{
          "technique": "...",
          "character": "...",
          "visual_description": "...",
          "timestamp": "..."
        }}
      ]
    }}
  system_prompt: "Tu es le spécialiste combat d'Animetix. Tu es imbattable sur l'identification des attaques signatures."

# --- LIBRARIAN PROMPTS ---

librarian_mission:
  template: |
    RÔLE : Bibliothécaire de Données (The Librarian).
    TACHE : Identifie précisément l'information manquante pour répondre à la requête.

    REQUÊTE UTILISATEUR : '{query}'
    CONTEXTE ACTUEL :
    {context}

    MISSION :
    1. Analyse pourquoi le contexte actuel est insuffisant.
    2. Génère une requête de recherche ultra-précise (ex: "Jikan API: anime 52991 characters").
    3. Si Jikan n'est pas applicable, génère une requête de recherche Web.

    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "missing_fact": "...",
      "source_type": "JIKAN|WEB",
      "query": "..."
    }}
  system_prompt: "Tu es le Bibliothécaire Animetix. Tu sais exactement où trouver les faits manquants."

# --- THE FORGE PROMPTS ---
forge_speculation:
  template: |
    RÔLE : Détective Expert en Patterns Anime (The Forge).
    TACHE : Génère une hypothèse logique basée sur les patterns du graphe pour combler une lacune de connaissance.

    REQUÊTE UTILISATEUR : '{query}'
    CONTEXTE RÉCOLTÉ (Incomplet) :
    {context}

    MISSION :
    1. Analyse les entités présentes (Studio, Auteur, Genre).
    2. Identifie les comportements passés similaires dans le graphe (ex: cycles de production habituels).
    3. Formule une hypothèse "instruite" et probable.
    4. Cite les patterns spécifiques qui soutiennent ta déduction.

    CONSIGNE CRITIQUE : Commence impérativement par "[SPECULATION]". Ne présente JAMAIS cela comme un fait établi.

    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "hypothesis": "...",
      "rationale": "Patterns identifiés : ...",
      "confidence": 0.0|1.0
    }}
  system_prompt: "Tu es le cerveau spéculatif d'Animetix. Tu transformes les manques de données en déductions expertes."

