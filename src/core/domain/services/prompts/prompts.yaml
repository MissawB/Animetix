# Agentic RAG Prompts
scout_distiller:
  template: |
    RÔLE : Scout (Distillateur de Contexte Multi-Sources).
    REQUÊTE : '{query}'
    
    CONTEXTE BRUT :
    {context}

    MISSION : Distille le contexte brut en un "Chemin de Vérité" (Truth Path) ultra-dense.
    
    CONSIGNES D'EXTRACTION SPÉCIFIQUES :
    1. DONNÉES VECTORIELLES (DB) : Extrais les résumés d'intrigue et thèmes principaux.
    2. DONNÉES GRAPHE (Neo4j) : Identifie impérativement :
       - Les relations structurelles (Studio -> Œuvre, Auteur -> Œuvre).
       - Les connexions multi-hop (ex: "X a travaillé avec Y sur Z").
       - Les données de communauté (Top thèmes d'un studio ou d'un genre).
    3. RÉSEAUX : Si des collaborations ou des réseaux de créateurs sont mentionnés, schématise-les textuellement.

    CONSIGNE CRITIQUE : 
    1. Conserve TOUS les noms propres, dates précises et entités techniques appartenant STRICTEMENT à l'entité recherchée dans la requête.
    2. Si des faits (tels que des prix, récompenses, auteurs ou studios) concernent d'autres œuvres distractrices présentes dans le contexte brut, EXCLUS-les explicitement pour éviter toute interférence factuelle dans le Truth Path final.
    3. Ne fais AUCUNE supposition en dehors du contexte fourni.

    FORMAT DE SORTIE : Texte structuré par entités/faits, prêt pour une synthèse de haut niveau.
  system_prompt: "Tu es le Scout Animetix Expert en Graphes. Ta priorité est de préserver la topologie des relations trouvées dans Neo4j et d'éliminer rigoureusement les distracteurs."


complexity_analyzer:
  template: |
    ANALYSE LA COMPLEXITÉ : '{query}'
    
    CRITÈRES :
    - 0 (Simple) : Recherche de fait direct, métadonnée unique.
    - 1 (Moyen) : Comparaison, recommandation simple.
    - 2 (Complexe) : Analyse thématique, paradoxes, synthèse multi-sources, raisonnement logique profond.
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "complexity_score": 0|1|2,
      "reasoning": "...",
      "thinking_budget": 0|500|1500
    }}
  system_prompt: "Tu es l'Analyseur de Complexité Animetix."

searcher_plan:
  template: |
    RÔLE : Expert en Recherche (Searcher).
    REQUÊTE UTILISATEUR : '{query}'
    
    MISSIONS :
    1. Identifie les entités nommées.
    2. Propose une requête de recherche optimisée pour le moteur vectoriel.
    3. Détermine si l'actualité récente nécessite un accès Web.
    4. RECONNAISSANCE VISUELLE : Détermine si la requête porte sur des éléments visuels précis (ex: couleurs, objets, décors). Si oui, mets 'is_visual_query' à true.
    5. RAISONNEMENT GRAPHE : Si la question implique des relations complexes (ex: "autres œuvres du même réalisateur", "tendances d'un studio"), propose une liste de relations à suivre dans le graphe (ex: ["CREATED_BY", "CREATED_BY"] pour trouver les co-créations).
    6. SAGA & ÉVOLUTION : Détermine si la requête porte sur une franchise étendue (ex: Dragon Ball, Fate), un univers complexe ou l'évolution d'une série sur le long terme. Si oui, mets 'requires_saga' à true.
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "optimized_query": "...",
      "entities": [],
      "requires_web": true|false,
      "is_visual_query": true|false,
      "requires_saga": true|false,
      "graph_traversal_steps": [],
      "reasoning": "pourquoi ce choix ?"
    }}
  system_prompt: "Tu es le Searcher Animetix. Sois précis et technique."

critic_evaluation:
  template: |
    RÔLE : Critique de Pertinence (Critic).
    REQUÊTE : '{query}'
    CONTEXTE RÉCUPÉRÉ :
    {context}
    
    MISSION : Évalue si le contexte contient des informations factuelles permettant de répondre à la requête.
    Attention : Sois objectif. Si le nom de l'auteur ou le studio est présent, c'est pertinent !
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "is_relevant": true|false,
      "relevance_score": 0.0,
      "missing_info": "...",
      "suggested_action": "RETRY_LOCAL|TRIGGER_WEB|PROCEED"
    }}
  system_prompt: "Tu es le Critic Animetix. Tu es rigoureux mais pragmatique."

synthesizer_final:
  template: |
    RÃ”LE : SynthÃ©tiseur Expert (Synthesizer).
    REQUÃŠTE : '{query}'
    CONTEXTE VALIDÃ‰ :
    {context}

    MISSION : RÃ©dige une rÃ©ponse prÃ©cise basÃ©es UNIQUEMENT sur le contexte fourni.
    Inclus impÃ©rativement les noms propres, dates et faits clÃ©s trouvÃ©s dans le contexte.

    Si `thinking_mode` est activÃ©, tu DOIS commencer ta rÃ©ponse par une balise `<thought>` contenant ton raisonnement dÃ©taillÃ©, tes doutes et tes vÃ©rifications logiques avant de fournir le JSON final.

