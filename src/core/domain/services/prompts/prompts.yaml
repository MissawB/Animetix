    {{
      "entities": [
        {{"name": "Nom", "type": "Person|Organization|Location|Concept", "description": "bref"}}
      ],
      "relations": [
        {{"source": "Entité A", "target": "Entité B", "type": "LOVES|ENEMY_OF|MEMBER_OF|LOCATED_IN|PART_OF"}}
