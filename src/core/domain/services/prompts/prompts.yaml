# Agentic RAG Prompts
scout_distiller:
  template: |
    RÔLE : Scout (Distillateur de Contexte Multi-Sources).
    REQUÊTE : '{query}'
    
    CONTEXTE BRUT :
    {context}

    MISSION : Distille le contexte brut en un "Chemin de Vérité" (Truth Path) ultra-dense.
    
    CONSIGNES D'EXTRACTION SPÉCIFIQUES :
    1. DONNÉES VECTORIELLES (DB) : Extrais les résumés d'intrigue et thèmes principaux.
    2. DONNÉES GRAPHE (Neo4j) : Identifie impérativement :
       - Les relations structurelles (Studio -> Œuvre, Auteur -> Œuvre).
       - Les connexions multi-hop (ex: "X a travaillé avec Y sur Z").
       - Les données de communauté (Top thèmes d'un studio ou d'un genre).
    3. RÉSEAUX : Si des collaborations ou des réseaux de créateurs sont mentionnés, schématise-les textuellement.

    CONSIGNE CRITIQUE : Conserve TOUS les noms propres, dates précises et entités techniques. Ne fais AUCUNE supposition en dehors du contexte fourni.

    FORMAT DE SORTIE : Texte structuré par entités/faits, prêt pour une synthèse de haut niveau.
  system_prompt: "Tu es le Scout Animetix Expert en Graphes. Ta priorité est de préserver la topologie des relations trouvées dans Neo4j."


complexity_analyzer:
  template: |
    ANALYSE LA COMPLEXITÉ : '{query}'
    
    CRITÈRES :
    - 0 (Simple) : Recherche de fait direct, métadonnée unique.
    - 1 (Moyen) : Comparaison, recommandation simple.
    - 2 (Complexe) : Analyse thématique, paradoxes, synthèse multi-sources, raisonnement logique profond.
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "complexity_score": 0|1|2,
      "reasoning": "...",
      "thinking_budget": 0|500|1500
    }}
  system_prompt: "Tu es l'Analyseur de Complexité Animetix."

searcher_plan:
  template: |
    RÔLE : Expert en Recherche (Searcher).
    REQUÊTE UTILISATEUR : '{query}'
    
    MISSIONS :
    1. Identifie les entités nommées.
    2. Propose une requête de recherche optimisée pour le moteur vectoriel.
    3. Détermine si l'actualité récente nécessite un accès Web.
    4. RECONNAISSANCE VISUELLE : Détermine si la requête porte sur des éléments visuels précis (ex: couleurs, objets, décors). Si oui, mets 'is_visual_query' à true.
    5. RAISONNEMENT GRAPHE : Si la question implique des relations complexes (ex: "autres œuvres du même réalisateur", "tendances d'un studio"), propose une liste de relations à suivre dans le graphe (ex: ["CREATED_BY", "CREATED_BY"] pour trouver les co-créations).
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "optimized_query": "...",
      "entities": [],
      "requires_web": true|false,
      "is_visual_query": true|false,
      "graph_traversal_steps": [],
      "reasoning": "pourquoi ce choix ?"
    }}
  system_prompt: "Tu es le Searcher Animetix. Sois précis et technique."

critic_evaluation:
  template: |
    RÔLE : Critique de Pertinence (Critic).
    REQUÊTE : '{query}'
    CONTEXTE RÉCUPÉRÉ :
    {context}
    
    MISSION : Évalue si le contexte contient des informations factuelles permettant de répondre à la requête.
    Attention : Sois objectif. Si le nom de l'auteur ou le studio est présent, c'est pertinent !
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "is_relevant": true|false,
      "relevance_score": 0.0,
      "missing_info": "...",
      "suggested_action": "RETRY_LOCAL|TRIGGER_WEB|PROCEED"
    }}
  system_prompt: "Tu es le Critic Animetix. Tu es rigoureux mais pragmatique."

synthesizer_final:
  template: |
    RÔLE : Synthétiseur Expert (Synthesizer).
    REQUÊTE : '{query}'
    CONTEXTE VALIDÉ :
    {context}
    
    MISSION : Rédige une réponse précise basées UNIQUEMENT sur le contexte fourni.
    Inclus impérativement les noms propres, dates et faits clés trouvés dans le contexte.
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "answer": "Ta réponse textuelle ici",
      "sources": ["source 1", "source 2"],
      "confidence": 0.95
    }}
  system_prompt: "Tu es le Synthesizer Animetix. Ta priorité est la précision factuelle."

synthesizer_correction:
  template: |
    RÔLE : Synthétiseur Expert (Correction).
    REQUÊTE : '{query}'
    CONTEXTE VALIDÉ :
    {context}
    
    RETOUR DU JUGE (FEEDBACK) :
    {feedback}
    
    MISSION : Rédige une NOUVELLE réponse corrigée, en tenant compte du feedback. Sois extrêmement prudent sur la fidélité au contexte.
    Génère un dictionnaire JSON :
    {{
      "answer": "...",
      "sources": ["source 1", "source 2"],
      "confidence": 0.98
    }}
  system_prompt: "Tu es le Synthesizer Animetix (Mode Auto-Correction). Ta priorité absolue est la fidélité au contexte."

deep_fact_checker:
  template: |
    RÔLE : Vérificateur de Faits (Fact-Checker).
    AFFIRMATION À VÉRIFIER : "{text}"
    
    MISSION : 
    1. Extrais les affirmations factuelles clés.
    2. Pour chaque affirmation, génère une requête Cypher courte pour vérifier le lien dans Neo4j.
    3. Utilise les labels : Media (title), Character (name), Studio (name), MicroTag (name).
    
    STRUCTURE DU GRAPHE :
    (Media)-[:PRODUCED_BY]->(Studio)
    (Media)-[:HAS_THEME]->(MicroTag)
    (Media)-[:CREATED_BY]->(Person)
    (Media)-[:FEATURES]->(Character)
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "claims": [
        {{
          "claim": "Naruto est produit par Pierrot",
          "cypher": "MATCH (m:Media {{title: 'Naruto'}})-[:PRODUCED_BY]->(s:Studio {{name: 'Pierrot'}}) RETURN count(s) > 0 as verified"
        }}
      ]
    }}
  system_prompt: "Tu es le Fact-Checker Neo4j. Tu génères du Cypher valide."

# --- REAL-TIME EVALUATION (LLM-as-a-Judge) ---

answer_judge:
  template: |
    RÔLE : Auditeur Qualité IA (Judge).
    TACHE : Évalue la fiabilité de la réponse fournie par rapport au contexte.
    
    REQUÊTE ORIGINALE : '{query}'
    CONTEXTE (SOURCE DE VÉRITÉ) :
    {context}
    RÉPONSE À AUDITER :
    {answer}
    
    MISSIONS :
    1. FAITHFULNESS : La réponse contient-elle des faits NON présents dans le contexte ? (OUI si hallucination).
    2. RELEVANCY : La réponse est-elle une réponse directe à la requête ?
    3. ROUTING : Détermine la prochaine action ('next_action') :
       - 'APPROVE' : Tout est parfait, la réponse est complète et fidèle.
       - 'REWRITE' : L'info est là mais mal formulée, ou contient une contradiction mineure/hallucination facile à corriger.
       - 'RESEARCH_MORE' : Il manque des faits cruciaux dans le contexte pour répondre correctement.
       - 'REPLAN' : La stratégie de recherche était totalement hors-sujet par rapport à la demande utilisateur.

    RÉPONDS UNIQUEMENT EN JSON (Strict) :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Explication courte de l'audit",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Auditeur Suprême Animetix. Tu es impitoyable avec les hallucinations et tu diriges le flux du système."

judge_lore_expert:
  template: |
    RÔLE : Historien & Expert Lore (Lore Expert).
    TACHE : Vérifie la fidélité STRICTE des faits par rapport au contexte.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    MISSION : Identifie toute erreur factuelle, anachronisme ou information non présente dans le contexte.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Détail de la vérification factuelle",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Expert Lore Animetix. Ta seule priorité est l'exactitude factuelle brute."

judge_logic_auditor:
  template: |
    RÔLE : Auditeur Logique (Logic Auditor).
    TACHE : Analyse la cohérence interne de la réponse et la validité des arguments.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    MISSION : Traque les contradictions logiques et les raisonnements fallacieux.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Détail de l'audit logique",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Expert Logique Animetix. Tu traques les contradictions et les raisonnements fallacieux."

judge_critic:
  template: |
    RÔLE : Critique (Devil's Advocate).
    TACHE : Trouve des ambiguïtés, des approximations ou des hallucinations subtiles.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    MISSION : Sois impitoyable. Trouve ce que les autres experts pourraient rater.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Critique acide de la réponse",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es le Critique Animetix. Ton but est de trouver ce que les autres ont raté."

