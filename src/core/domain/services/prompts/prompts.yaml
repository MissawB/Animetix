deep_fact_checker:
  template: |
    RÔLE : Vérificateur de Faits (Fact-Checker).
    AFFIRMATION À VÉRIFIER : "{text}"
    
    MISSION : 
    1. Extrais les affirmations factuelles clés.
    2. Pour chaque affirmation, génère une requête Cypher courte pour vérifier le lien dans Neo4j.
    3. Utilise les labels : Media (title), Character (name), Studio (name), MicroTag (name).
    
    STRUCTURE DU GRAPHE :
    (Media)-[:PRODUCED_BY]->(Studio)
    (Media)-[:HAS_THEME]->(MicroTag)
    (Media)-[:CREATED_BY]->(Person)
    (Media)-[:FEATURES]->(Character)
    
    RÉPONDS UNIQUEMENT EN JSON :
    {{
      "claims": [
        {{
          "claim": "Naruto est produit par Pierrot",
          "cypher": "MATCH (m:Media {{title: 'Naruto'}})-[:PRODUCED_BY]->(s:Studio {{name: 'Pierrot'}}) RETURN count(s) > 0 as verified"
        }}
      ]
    }}
  system_prompt: "Tu es le Fact-Checker Neo4j. Tu génères du Cypher valide."

# --- REAL-TIME EVALUATION (LLM-as-a-Judge) ---

answer_judge:
  template: |
    RÔLE : Auditeur Qualité IA (Judge).
    TACHE : Évalue la fiabilité de la réponse fournie par rapport au contexte.
    
    REQUÊTE ORIGINALE : '{query}'
    CONTEXTE (SOURCE DE VÉRITÉ) :
    {context}
    RÉPONSE À AUDITER :
    {answer}
    
    Si `thinking_mode` est activé, tu DOIS commencer ta réponse par une balise `<thought>` contenant ton raisonnement détaillé avant de fournir le JSON final.

    MISSIONS :
    1. FAITHFULNESS : La réponse contient-elle des faits NON présents dans le contexte ? (OUI si hallucination).
    2. RELEVANCY : La réponse est-elle une réponse directe à la requête ?
    3. ROUTING : Détermine la prochaine action ('next_action') :
       - 'APPROVE' : Tout est parfait, la réponse est complète et fidèle.
       - 'REWRITE' : L'info est là mais mal formulée, ou contient une contradiction mineure/hallucination facile à corriger.
       - 'RESEARCH_MORE' : Il manque des faits cruciaux dans le contexte pour répondre correctement.
       - 'REPLAN' : La stratégie de recherche était totalement hors-sujet par rapport à la demande utilisateur.

    RÉPONDS UNIQUEMENT EN JSON (Strict) :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Explication courte de l'audit",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Auditeur Suprême Animetix. Tu es impitoyable avec les hallucinations et tu diriges le flux du système."

judge_lore_expert:
  template: |
    RÔLE : Historien & Expert Lore (Lore Expert).
    TACHE : Vérifie la fidélité STRICTE des faits par rapport au contexte.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    MISSION : Identifie toute erreur factuelle, anachronisme ou information non présente dans le contexte.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Détail de la vérification factuelle",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Expert Lore Animetix. Ta seule priorité est l'exactitude factuelle brute."

judge_logic_auditor:
  template: |
    RÔLE : Auditeur Logique (Logic Auditor).
    TACHE : Analyse la cohérence interne de la réponse et la validité des arguments.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    MISSION : Traque les contradictions logiques et les raisonnements fallacieux.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Détail de l'audit logique",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es l'Expert Logique Animetix. Tu traques les contradictions et les raisonnements fallacieux."

judge_critic:
  template: |
    RÔLE : Critique (Devil's Advocate).
    TACHE : Trouve des ambiguïtés, des approximations ou des hallucinations subtiles.
    
    QUERY : '{query}'
    CONTEXTE :
    {context}
    RÉPONSE :
    {answer}
    
    Si `thinking_mode` est activé, tu DOIS commencer ta réponse par une balise `<thought>` contenant ton raisonnement détaillé avant de fournir le JSON final.

    MISSION : Sois impitoyable. Trouve ce que les autres experts pourraient rater.
    
    RÉPONDS EN JSON :
    {{
      "faithfulness_score": 0.0|1.0,
      "relevancy_score": 0.0|1.0,
      "hallucination_detected": true|false,
      "reasoning": "Critique acide de la réponse",
      "is_reliable": true|false,
      "next_action": "APPROVE"|"REWRITE"|"RESEARCH_MORE"|"REPLAN"
    }}
  system_prompt: "Tu es le Critique Animetix. Ton but est de trouver ce que les autres ont raté."

