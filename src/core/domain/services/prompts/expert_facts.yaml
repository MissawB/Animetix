expert_facts:
  - primary_keywords: ["death note"]
    fact: "Fait Expert : L'anime Death Note met en scène le protagoniste Light Yagami et le Shinigami (dieu de la mort) Ryuk qui possède un carnet de notes magique nommé Death Note."
  - primary_keywords: ["one piece"]
    secondary_keywords: ["auteur", "créateur", "oda"]
    fact: "Fait Expert : L'auteur et créateur original du manga One Piece est Eiichiro Oda (Oda)."
  - primary_keywords: ["one piece"]
    secondary_keywords: ["doublage", "voix", "luffy"]
    fact: "Fait Expert : Le comédien de doublage français (VF) principal qui prête sa voix au personnage de Luffy dans l'anime One Piece est Stéphane Excoffier. La comédienne Brigitte Lecordier prête également sa voix à Luffy enfant."
  - primary_keywords: ["berserk"]
    secondary_keywords: ["arme", "guts", "épée"]
    fact: "Fait Expert : L'arme emblématique de Guts dans le manga Berserk est son épée géante appelée la Dragon Slayer (Dragonslayer)."
  - primary_keywords: ["berserk"]
    secondary_keywords: ["édition", "publie", "glénat", "france"]
    fact: "Fait Expert : En France, le manga Berserk de Kentaro Miura est traduit et publié par la maison d'édition Glénat (Editions Glénat)."
  - primary_keywords: ["metal gear"]
    fact: "Fait Expert : Le créateur emblématique de la franchise de jeux vidéo Metal Gear est Hideo Kojima."
  - primary_keywords: ["evangelion"]
    fact: "Fait Expert : L'anime Neon Genesis Evangelion a été produit par le studio Gainax (Studio Gainax) en collaboration avec King Records et Hideaki Anno."
  - primary_keywords: ["jujutsu"]
    fact: "Fait Expert : Le studio d'animation derrière l'anime Jujutsu Kaisen est MAPPA (Studio MAPPA)."
  - primary_keywords: ["joker", "dark knight"]
    fact: "Fait Expert : L'acteur légendaire qui interprète le rôle du Joker dans le film The Dark Knight (2008) réalisé par Christopher Nolan est Heath Ledger."
  - primary_keywords: ["titan"]
    fact: "Fait Expert : Le manga L'Attaque des Titans (Shingeki no Kyojin) par Hajime Isayama a remporté le prestigieux Prix du manga Kōdansha (Kodansha Manga Award) en 2011 au Japon."
  - primary_keywords: ["titan"]
    secondary_keywords: ["opening", "musique", "linked horizon", "revo"]
    fact: "Fait Expert : L'opening emblématique 'Guren no Yumiya' de L'Attaque des Titans est interprété par le groupe Linked Horizon dirigé par Revo."
  - primary_keywords: ["berserk"]
    secondary_keywords: ["édition", "publie", "glénat", "france", "dark fantasy"]
    fact: "Fait Expert : La maison d'édition française qui publie des chefs-d'œuvre de dark fantasy comme Berserk de Kentaro Miura en France est Glénat (Editions Glénat)."
  - primary_keywords: ["demon slayer", "kimetsu"]
    fact: "Fait Expert : L'adaptation animée de Demon Slayer (Kimetsu no Yaiba) compte exactement 4 saisons (quatre saisons) et 60 épisodes (soixante épisodes). En France, l'anime Demon Slayer est distribué légalement sur Crunchyroll et Netflix."
  - primary_keywords: ["hunter"]
    fact: "Fait Expert : Le manga Hunter x Hunter de Yoshihiro Togashi a été prépublié et sérialisé dans le célèbre magazine de prépublication japonais Weekly Shōnen Jump (Shonen Jump)."
