{% load i18n %}
{% if request.user.is_authenticated %}
<div class="mb-10 bg-gray-50 dark:bg-navy-700 p-5 rounded-3xl shadow-xl">
    <div class="flex items-center gap-4 mb-4">
        <div class="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center font-black italic border-2 border-black transform rotate-3">
            {{ request.user.username|slice:":1"|upper }}
        </div>
        <div>
            <p class="manga-font text-sm m-0">{{ request.user.username }}</p>
            <p class="text-[10px] font-bold text-yellow-600 uppercase m-0">{% trans "Niv." %} {{ request.user.profile.level }}</p>
        </div>
    </div>
    <div class="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded-full overflow-hidden">
        <div class="bg-yellow-400 h-full shadow-[0_0_10px_#fdb913] progress-bar-smooth" style="width: {{ request.user.profile.level_xp_progress }}%"></div>
    </div>
    <div class="flex justify-between mt-2 font-black text-[10px] opacity-40">
        <span>{{ request.user.profile.xp }} XP</span>
        <span>{% trans "NIV. SUIV." %}</span>
    </div>
</div>
{% endif %}
