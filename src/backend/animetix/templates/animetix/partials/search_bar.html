<div class="mb-5 position-relative">
    <form hx-post="{{ action_url }}" hx-target="main" hx-swap="innerHTML transition:true" hx-push-url="true" class="m-0">
        {% csrf_token %}
        <div class="input-group input-group-custom bg-white dark:bg-navy-800 rounded-3xl overflow-hidden shadow-lg border border-white/10">
            <span class="input-group-text border-0 bg-transparent ps-4">
                <i class="bi bi-search fs-5 opacity-50 text-primary"></i>
            </span>
            <input type="text" id="{{ input_id }}" name="guess" class="form-control form-control-lg border-0 shadow-none bg-transparent py-4 ps-2" placeholder="{{ placeholder }}" autocomplete="off" style="color: inherit;">
            <button type="submit" class="btn btn-primary px-6 font-black italic manga-font rounded-2xl m-2 shadow-xl transition-all hover:scale-105">
                Valider
            </button>
        </div>
        <div id="autocomplete-results-{{ input_id }}" class="list-group position-absolute w-100 mt-2 shadow-2xl animate__animated animate__fadeIn" style="z-index: 1000; display: none; border-radius: 20px; overflow: hidden; background: white; border: 1px solid rgba(0,0,0,0.1);">
        </div>
    </form>
</div>

<script>
    (function() {
        const inputId = "{{ input_id }}";
        const mediaType = "{{ media_type|default:'' }}";
        const input = document.getElementById(inputId);
        const results = document.getElementById('autocomplete-results-' + inputId);
        
        if (!input || !results) return;

        let debounceTimer;

        input.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const val = this.value.trim();
            
            if (val.length < 2) {
                results.innerHTML = '';
                results.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetch(`/api/search/?q=${encodeURIComponent(val)}&media_type=${mediaType}&limit=10`)
                    .then(response => response.json())
                    .then(data => {
                        results.innerHTML = '';
                        
                        if (data.length > 0) {
                            data.forEach(item => {
                                const div = document.createElement('div');
                                div.className = 'list-group-item list-group-item-action d-flex align-items-center border-0 py-3 px-4 hover:bg-gray-50 transition-colors';
                                div.style.cursor = 'pointer';
                                const imgUrl = item.image || 'https://via.placeholder.com/45x60?text=?';
                                div.innerHTML = `
                                    <img src="${imgUrl}" style="width: 45px; height: 60px; object-fit: cover; border-radius: 8px;" class="me-3 shadow-sm" onerror="this.src='https://via.placeholder.com/45x60?text=?'">
                                    <div class="overflow-hidden">
                                        <div class="fw-bold text-truncate text-navy-900" style="color: #1a1a2e !important;">${item.title}</div>
                                        <div class="text-muted small text-truncate">${item.title_english || ''}</div>
                                    </div>
                                `;
                                div.onclick = function() {
                                    input.value = item.title;
                                    results.style.display = 'none';
                                };
                                results.appendChild(div);
                            });
                            results.style.display = 'block';
                        } else {
                            results.style.display = 'none';
                        }
                    })
                    .catch(err => {
                        console.error('Autocomplete Error:', err);
                        results.style.display = 'none';
                    });
            }, 300); // 300ms debounce
        });

        document.addEventListener('click', (e) => {
            if (e.target !== input && !results.contains(e.target)) {
                results.style.display = 'none';
            }
        });
    })();
</script>
