<div class="relative w-full h-[200px] char-card-group cursor-pointer animate-float" style="animation-delay: 0.{{ counter0 }}s">
    {% if mode.post_only %}
    <form hx-post="{% url mode.url %}" hx-target="main" hx-swap="innerHTML transition:true" hx-push-url="true" id="form-{{ mode.url }}" class="h-full">
        {% csrf_token %}
        <div onclick="document.querySelector('#form-{{ mode.url }}').dispatchEvent(new Event('submit', {bubbles: true, cancelable: true}));" class="h-full relative">
    {% else %}
    <a href="{% url mode.url %}" hx-get="{% url mode.url %}" hx-target="main" hx-swap="innerHTML transition:true" hx-push-url="true" class="block h-full relative no-underline">
    {% endif %}
        
        <!-- 1. BACKGROUND LAYER -->
        <div class="absolute inset-0 rounded-[24px] overflow-hidden shadow-lg char-card-bg">
            <div class="absolute inset-0 bg-gradient-to-br {{ mode.gradient }}"></div>
            <img src="https://www.transparenttextures.com/patterns/stardust.png" class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-screen" alt="Stars">
        </div>

        <!-- 2. TEXT LAYER -->
        <div class="absolute top-[5%] -left-4 z-30 transition-transform duration-500 char-card-text pointer-events-none">
            <h2 class="manga-font text-white text-4xl leading-[0.7] -rotate-12 tracking-tighter uppercase whitespace-nowrap" style="text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 4px 10px rgba(0,0,0,0.5);">
                {{ mode.titre_brush_1 }}<br>
                <span class="text-yellow-400 text-2xl ml-6 tracking-normal">{{ mode.titre_brush_2 }}</span>
            </h2>
            <p class="manga-font text-white text-xs italic mt-8 ml-10 opacity-90 tracking-wider leading-relaxed max-w-[60%]" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">
                {{ mode.description }}
            </p>
        </div>

        <!-- 3. RENDER LAYER -->
        <img 
            src="{{ mode.icon_url }}" 
            alt="{{ mode.titre }}" 
            class="absolute bottom-0 -right-4 h-[105%] w-auto object-contain z-20 drop-shadow-[0_10px_10px_rgba(0,0,0,0.4)] transition-all duration-500 char-card-render"
            style="clip-path: inset(-100% -100% 0% -100%); max-width: none;"
        >

    {% if mode.post_only %}
        </div>
    </form>
    {% else %}
    </a>
    {% endif %}
</div>
