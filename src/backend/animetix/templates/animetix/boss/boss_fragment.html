<div id="boss-container" class="animate__animated {% if phase_changed %}animate__shakeX{% else %}animate__pulse{% endif %}">
    <!-- HP Progress -->
    <div class="mb-8">
        <div class="flex justify-between items-end mb-2">
            <span class="manga-font text-2xl">HP : {{ boss.current_hp }} / {{ boss.total_hp }}</span>
            <span class="text-sm font-black text-red-500 uppercase">PHASE {{ boss.current_phase }}</span>
        </div>
        <div class="h-6 bg-navy-950 rounded-full border-2 border-white/10 overflow-hidden shadow-inner">
            <div class="h-full bg-gradient-to-r from-red-600 to-orange-500 transition-all duration-1000" style="width: {{ hp_percent }}%">
                <div class="w-full h-full animate-pulse bg-white/20"></div>
            </div>
        </div>
    </div>

    {% if damage > 0 %}
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
        <div class="text-6xl font-black text-yellow-400 animate__animated animate__fadeOutUp italic" style="text-shadow: 0 0 20px rgba(0,0,0,0.8)">
            -{{ damage }} DMG
        </div>
    </div>
    {% endif %}

    {% if boss.current_hp <= 0 %}
    <div class="text-center py-12 animate__animated animate__tada">
        <h2 class="manga-font text-6xl text-yellow-400 mb-4">BOSS VAINCU !</h2>
        <p class="text-xl">Félicitations à toute la communauté !</p>
        <div class="mt-8 px-6 py-3 bg-yellow-400 text-black font-black inline-block rounded-2xl">+{{ boss.reward_xp }} XP RÉCOMPENSE</div>
    </div>
    {% endif %}
</div>
