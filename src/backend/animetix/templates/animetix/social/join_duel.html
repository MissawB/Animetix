{% extends "animetix/base.html" %}
{% load i18n %}

{% block content %}
<div class="min-h-screen bg-navy-950 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-navy-900 rounded-[3rem] p-12 shadow-2xl border-2 border-white/5 text-center">
        <h1 class="manga-font text-4xl mb-8">REJOINDRE UN <span class="text-yellow-400">DUEL</span></h1>
        
        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div>
                <label class="text-[10px] font-black uppercase tracking-[0.3em] opacity-40 mb-4 block">Entrez le code de la salle</label>
                <input type="text" name="room_code" maxlength="6" class="w-full bg-navy-950 border-2 border-white/10 rounded-2xl px-6 py-4 text-center text-3xl font-black text-yellow-400 focus:border-yellow-400 outline-none transition-all uppercase" placeholder="ABC123" required>
            </div>
            
            <button type="submit" class="w-full py-4 bg-yellow-400 text-black font-black italic rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-lg">
                COMBATTRE !
            </button>
        </form>
        
        <p class="mt-8 text-xs text-gray-500">
            Ou <a href="{% url 'create_duel' %}" class="text-yellow-400 font-bold underline">créez votre propre salle</a>
        </p>
    </div>
</div>
{% endblock %}
