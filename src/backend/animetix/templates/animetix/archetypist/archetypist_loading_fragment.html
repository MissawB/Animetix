<div class="text-center py-5 animate__animated animate__pulse animate__infinite" 
     hx-get="{% url 'task_status' task_id %}" 
     hx-trigger="every 2s" 
     hx-target="#forge-result" 
     hx-swap="innerHTML">
    <div class="spinner-grow text-primary mb-4" style="width: 4rem; height: 4rem;" role="status"></div>
    <h2 class="fw-bold">La forge est en fusion...</h2>
    <p class="text-muted">Calcul du synopsis et génération du visuel via Celery.</p>
</div>
