[supervisord]
nodaemon=true
user=root
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:django]
# Migration + Collectstatic + Lancement Gunicorn
command=bash -c "cd backend && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn animetix_project.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:7860 --workers 2"
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:celery_worker]
# Attente de la DB avant lancement
command=bash -c "sleep 5 && celery -A animetix_project worker --loglevel=info"
directory=/app/backend
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:chromadb]
# Lancement de ChromaDB en mode serveur sur le port 8000 (interne au conteneur)
command=chroma run --host 0.0.0.0 --port 8000 --path /app/data/chroma_db
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
