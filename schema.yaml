openapi: 3.0.3
info:
  title: Animetix API
  version: 1.0.0
  description: Documentation des APIs REST d'Animetix (Media Discovery & AI Games)
paths:
  /api/mlops/adapters/:
    get:
      operationId: api_mlops_adapters_retrieve
      description: |-
        API for managing MLOps Adapters.
        Allows real-time health checks and dynamic configuration.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_mlops_adapters_create
      description: |-
        API for managing MLOps Adapters.
        Allows real-time health checks and dynamic configuration.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/mlops/dpo-loop/:
    get:
      operationId: api_mlops_dpo_loop_retrieve
      description: |-
        API for managing the DPO Feedback Loop.
        Provides status, trends, and manual triggers for optimization.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_mlops_dpo_loop_create
      description: |-
        API for managing the DPO Feedback Loop.
        Provides status, trends, and manual triggers for optimization.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/monitoring/{action}/:
    post:
      operationId: api_monitoring_create
      parameters:
      - in: path
        name: action
        schema:
          type: string
        required: true
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/monitoring/cluster-health/:
    get:
      operationId: api_monitoring_cluster_health_retrieve
      description: |-
        GET /api/monitoring/cluster-health/
        Returns real-time health status for all cluster components:
        NVIDIA H100 GPUs, Ollama Inference, Neo4j Knowledge Graph.
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/observability/:
    get:
      operationId: api_observability_retrieve
      description: Retrieve observability status/drift metrics.
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: api_observability_create
      description: Update guardrail thresholds.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/achievements/:
    get:
      operationId: api_v1_achievements_list
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAchievementList'
          description: ''
