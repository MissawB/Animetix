components:
  schemas:
    AIREvalResult:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        game_mode:
          type: string
          maxLength: 50
        input_context:
          type: string
        output_text:
          type: string
        faithfulness:
          type: number
          format: double
        relevancy:
          type: number
          format: double
        precision:
          type: number
          format: double
        hallucination_detected:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
    AISafetyEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
          readOnly: true
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        action:
          $ref: '#/components/schemas/ActionEnum'
        detected_categories: {}
        input_text:
          type: string
          nullable: true
        output_text:
          type: string
          nullable: true
        reasoning:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          nullable: true
      required:
      - action
      - created_at
      - event_type
      - id
      - username
    Achievement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          maxLength: 50
        xp_reward:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        rarity:
          type: string
          maxLength: 20
      required:
      - code
      - description
      - icon
      - id
      - name
    ActionEnum:
      enum:
      - block
      - warn
      - rewrite
      - none
      type: string
      description: |-
        * `block` - Bloqué
        * `warn` - Avertissement
        * `rewrite` - Réécriture
        * `none` - Aucune
    ClubEvent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        club:
          type: integer
        title:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          readOnly: true
        participants_count:
          type: integer
          readOnly: true
        is_participant:
          type: string
          readOnly: true
      required:
      - club
      - created_at
      - description
      - event_date
      - id
      - is_participant
      - participants_count
      - title
    CreativeFusion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        creator_name:
          type: string
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        is_liked:
          type: string
          readOnly: true
        title_a:
          type: string
          maxLength: 255
        title_b:
          type: string
          maxLength: 255
        media_type_a:
          type: string
          maxLength: 50
        media_type_b:
          type: string
          maxLength: 50
        scenario_text:
          type: string
        image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        chaos_level:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        universe_balance:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        art_style:
          type: string
          maxLength: 100
        vn_script:
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type: integer
          nullable: true
        parent:
          type: integer
          nullable: true
        likes:
          type: array
          items:
            type: integer
      required:
      - created_at
      - creator_name
      - id
      - is_liked
      - likes_count
      - media_type_a
      - media_type_b
      - scenario_text
      - title_a
      - title_b
    DailyChallenge:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
        media_type:
          type: string
          maxLength: 20
        game_mode:
          type: string
          maxLength: 20
        secret_title:
          type: string
          maxLength: 255
      required:
      - date
      - id
      - media_type
      - secret_title
    DataCurationTicket:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        item_title:
          type: string
          maxLength: 255
        issue_description:
          type: string
        source_pg: {}
        source_neo4j: {}
        is_resolved:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - issue_description
      - item_title
    DiscoveryClub:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        theme:
          type: string
          maxLength: 50
        creator:
          type: integer
