          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCreativeFusion'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCreativeFusion'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreativeFusion'
          description: ''
    delete:
      operationId: api_fusions_destroy
      description: API endpoint pour visualiser, créer, liker et remixer des fusions
        créatives.
      parameters:
      - in: path
        name: id
