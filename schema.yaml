components:
  schemas:
    Achievement:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          maxLength: 50
        xp_reward:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        rarity:
          type: string
          maxLength: 20
      required:
      - code
      - description
      - icon
      - id
      - name
    CreativeFusion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        creator_name:
          type: string
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        is_remix:
          type: string
          readOnly: true
        title_a:
          type: string
          maxLength: 255
        title_b:
          type: string
          maxLength: 255
        media_type_a:
          type: string
          maxLength: 50
        media_type_b:
          type: string
          maxLength: 50
        scenario_text:
          type: string
        image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        chaos_level:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        universe_balance:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        art_style:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type: integer
          nullable: true
        parent:
          type: integer
          nullable: true
        likes:
          type: array
          items:
            type: integer
      required:
      - created_at
      - creator_name
      - id
      - is_remix
      - likes_count
      - media_type_a
      - media_type_b
      - scenario_text
      - title_a
      - title_b
    DailyChallenge:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
        media_type:
          type: string
          maxLength: 20
        game_mode:
          type: string
          maxLength: 20
        secret_title:
          type: string
          maxLength: 255
      required:
      - date
      - id
      - media_type
      - secret_title
    PaginatedAchievementList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Achievement'
    PaginatedCreativeFusionList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/CreativeFusion'
    PaginatedDailyChallengeList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/DailyChallenge'
    PaginatedProfileList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Profile'
    PatchedCreativeFusion:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        creator_name:
          type: string
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
          readOnly: true
        likes_count:
          type: integer
          readOnly: true
        is_remix:
          type: string
          readOnly: true
        title_a:
          type: string
          maxLength: 255
        title_b:
          type: string
          maxLength: 255
        media_type_a:
          type: string
          maxLength: 50
        media_type_b:
          type: string
          maxLength: 50
        scenario_text:
          type: string
        image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 500
        chaos_level:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        universe_balance:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        art_style:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        creator:
          type: integer
          nullable: true
        parent:
          type: integer
          nullable: true
        likes:
          type: array
          items:
            type: integer
    Profile:
      type: object
      properties:
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        xp:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        current_streak:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        max_streak:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        total_wins:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        total_games:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        ranked_points:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        ranked_max_points:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        rank:
          type: string
          readOnly: true
      required:
      - rank
      - user
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Adresse électronique
          maxLength: 254
      required:
      - id
      - username
    DocumentAttribution:
      type: object
      properties:
        document_id:
          type: string
        title:
          type: string
        relevance_score:
          type: number
          format: float
        contribution_weight:
          type: number
          format: float
      required:
      - document_id
      - title
      - relevance_score
      - contribution_weight
    ModelDiagnostics:
      type: object
      properties:
        attention_heatmap:
          type: array
          items:
            type: array
            items:
              type: number
              format: float
        top_influential_tokens:
          type: array
          items:
            type: string
        logit_lens_trajectory:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - attention_heatmap
      - top_influential_tokens
      - logit_lens_trajectory
    XaiReport:
      type: object
      properties:
        query_intent:
          type: string
        retrieval_attribution:
          type: array
          items:
            $ref: '#/components/schemas/DocumentAttribution'
        internal_diagnostics:
          allOf:
          - $ref: '#/components/schemas/ModelDiagnostics'
          nullable: true
        uncertainty:
          type: object
          additionalProperties: {}
        agent_trace:
          type: array
          items:
            type: object
            additionalProperties: {}
        final_confidence:
          type: number
          format: float
      required:
      - query_intent
      - retrieval_attribution
      - uncertainty
      - agent_trace
      - final_confidence
  securitySchemes:
    basicAuth:
