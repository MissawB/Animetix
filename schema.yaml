openapi: 3.0.3
info:
  title: Animetix API
  version: 1.0.0
  description: Documentation des APIs REST d'Animetix (Media Discovery & AI Games)
paths:
  /api/mlops/adapters/:
    get:
      operationId: api_mlops_adapters_retrieve
      description: |-
        API for managing MLOps Adapters.
        Allows real-time health checks and dynamic configuration.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_mlops_adapters_create
      description: |-
        API for managing MLOps Adapters.
        Allows real-time health checks and dynamic configuration.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/mlops/dpo-loop/:
    get:
      operationId: api_mlops_dpo_loop_retrieve
      description: |-
        API for managing the DPO Feedback Loop.
        Provides status, trends, and manual triggers for optimization.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_mlops_dpo_loop_create
      description: |-
        API for managing the DPO Feedback Loop.
        Provides status, trends, and manual triggers for optimization.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/monitoring/{action}/:
    post:
      operationId: api_monitoring_create
      parameters:
      - in: path
        name: action
        schema:
          type: string
        required: true
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/monitoring/cluster-health/:
    get:
      operationId: api_monitoring_cluster_health_retrieve
      description: |-
        GET /api/monitoring/cluster-health/
        Returns real-time health status for all cluster components:
        NVIDIA H100 GPUs, Ollama Inference, Neo4j Knowledge Graph.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/observability/:
    get:
      operationId: api_observability_retrieve
      description: Retrieve observability status/drift metrics.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_observability_create
      description: Update guardrail thresholds.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/achievements/:
    get:
      operationId: api_v1_achievements_list
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAchievementList'
          description: ''
  /api/v1/achievements/{id}/:
    get:
      operationId: api_v1_achievements_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) achievement.
        required: true
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Achievement'
          description: ''
  /api/v1/admin/ai_eval/data/:
    get:
      operationId: api_v1_admin_ai_eval_data_retrieve
      description: API for AI Evaluation results and stats.
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIREvalResult'
          description: ''
  /api/v1/admin/economics/:
    get:
      operationId: api_v1_admin_economics_retrieve
      description: Analyse macro-économique des flux de Berrix (Bx).
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/admin/financials/:
    get:
      operationId: api_v1_admin_financials_retrieve
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/admin/observability/:
    get:
      operationId: api_v1_admin_observability_retrieve
      description: Retrieve observability status/drift metrics.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_v1_admin_observability_create
      description: Update guardrail thresholds.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/admin/pipelines/control/{action}/:
    post:
      operationId: api_v1_admin_pipelines_control_create
      parameters:
      - in: path
        name: action
        schema:
          type: string
        required: true
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/admin/ttc-monitoring/:
    get:
      operationId: api_v1_admin_ttc_monitoring_retrieve
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/admin/users/:
    get:
      operationId: api_v1_admin_users_list
      description: Gestion des comptes utilisateurs pour les administrateurs.
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserAdminList'
          description: ''
  /api/v1/admin/users/{id}/toggle-active/:
    post:
      operationId: api_v1_admin_users_toggle_active_create
      description: Gestion des comptes utilisateurs pour les administrateurs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAdmin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserAdmin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserAdmin'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdmin'
          description: ''
  /api/v1/admin/users/{id}/toggle-staff/:
    post:
      operationId: api_v1_admin_users_toggle_staff_create
      description: Gestion des comptes utilisateurs pour les administrateurs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAdmin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserAdmin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserAdmin'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAdmin'
          description: ''
  /api/v1/archetypist/start/:
    post:
      operationId: api_v1_archetypist_start_create
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/archetypist/status/:
    get:
      operationId: api_v1_archetypist_status_retrieve
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/archetypist/theater/:
    get:
      operationId: api_v1_archetypist_theater_retrieve
      description: Returns a list of all public fusions that have a generated Visual
        Novel script.
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/archetypist/vn/{fusion_id}/:
    get:
      operationId: api_v1_archetypist_vn_retrieve
      description: Returns the VN script for a specific fusion.
      parameters:
      - in: path
        name: fusion_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: api_v1_archetypist_vn_create
      description: |-
        Action 'generate': Generates a script and saves it.
        Action 'update': Updates the script (Director Mode).
      parameters:
      - in: path
        name: fusion_id
        schema:
          type: integer
        required: true
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: api_v1_auth_login_create
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout/:
    post:
      operationId: api_v1_auth_logout_create
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: api_v1_auth_me_retrieve
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/register/:
    post:
      operationId: api_v1_auth_register_create
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/billing/log_ad_event/:
    post:
      operationId: api_v1_billing_log_ad_event_create
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/billing/wallet/balance/:
    get:
      operationId: api_v1_billing_wallet_balance_retrieve
      description: Récupère le solde actuel et l'historique récent des transactions.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/billing/wallet/mine/:
    post:
      operationId: api_v1_billing_wallet_mine_create
      description: |-
        Endpoint pour le minage passif de Berrix (Bx).
        Crédite le portefeuille de l'utilisateur s'il a passé assez de temps sur le site.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/billing/wallet/watch-ad/:
    post:
      operationId: api_v1_billing_wallet_watch_ad_create
      description: Endpoint pour la recharge active via Reward Ads (Berrix).
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/club-events/:
    get:
      operationId: api_v1_club_events_list
      description: API endpoint pour gérer les événements de clubs.
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClubEventList'
          description: ''
    post:
      operationId: api_v1_club_events_create
      description: API endpoint pour gérer les événements de clubs.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClubEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClubEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClubEvent'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubEvent'
          description: ''
  /api/v1/club-events/{id}/:
    get:
      operationId: api_v1_club_events_retrieve
      description: API endpoint pour gérer les événements de clubs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubEvent'
          description: ''
    put:
      operationId: api_v1_club_events_update
      description: API endpoint pour gérer les événements de clubs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClubEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClubEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClubEvent'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubEvent'
          description: ''
    patch:
      operationId: api_v1_club_events_partial_update
      description: API endpoint pour gérer les événements de clubs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClubEvent'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClubEvent'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClubEvent'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClubEvent'
          description: ''
    delete:
      operationId: api_v1_club_events_destroy
      description: API endpoint pour gérer les événements de clubs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      responses:
        '204':
          description: No response body
  /api/v1/clubs/:
    get:
      operationId: api_v1_clubs_list
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDiscoveryClubList'
          description: ''
    post:
      operationId: api_v1_clubs_create
      description: API endpoint pour gérer les clubs de découverte.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
  /api/v1/clubs/{id}/:
    get:
      operationId: api_v1_clubs_retrieve
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
    put:
      operationId: api_v1_clubs_update
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
    patch:
      operationId: api_v1_clubs_partial_update
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDiscoveryClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDiscoveryClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDiscoveryClub'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
    delete:
      operationId: api_v1_clubs_destroy
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      responses:
        '204':
          description: No response body
  /api/v1/clubs/{id}/join/:
    post:
      operationId: api_v1_clubs_join_create
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
  /api/v1/clubs/{id}/leave/:
    post:
      operationId: api_v1_clubs_leave_create
      description: API endpoint pour gérer les clubs de découverte.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoveryClub'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoveryClub'
          description: ''
  /api/v1/cognition/archetype-nexus/:
    get:
      operationId: api_v1_cognition_archetype_nexus_retrieve
      description: |-
        Interface de profilage cognitif avancé.
        Expose le drift d'archétype et les règles logiques déduites par Z3.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/cognition/cfr-strategy-lab/:
    post:
      operationId: api_v1_cognition_cfr_strategy_lab_create
      description: |-
        Interface pour visualiser la convergence du solveur CFR (Counterfactual Regret Minimization).
        Simule la résolution de dilemmes stratégiques pour Akinetix.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/cognition/counterfactual/:
    post:
      operationId: api_v1_cognition_counterfactual_create
      description: Simulateur de timelines alternatives pour une conversation donnée.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/cognition/cove-oracle/:
    post:
      operationId: api_v1_cognition_cove_oracle_create
      description: |-
        Interface pour visualiser le processus Chain-of-Verification (CoVe).
        Réduit les hallucinations en décomposant et vérifiant les assertions.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/cognition/debate-arena/:
    post:
      operationId: api_v1_cognition_debate_arena_create
      description: |-
        Interface pour orchestrer des débats entre agents IA sur des thématiques de lore.
        Utilise le SelfPlayDebateService.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/cognition/neuro-memory/:
    get:
      operationId: api_v1_cognition_neuro_memory_retrieve
      description: |-
        Gestion fine des règles logiques déduites (Neuro-Symbolique).
        Permet à l'utilisateur de révoquer ce que l'IA a 'compris'.
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_v1_cognition_neuro_memory_create
      description: Révoquer une règle ou réinitialiser le profil logique.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/companion/interact/:
    post:
      operationId: api_v1_companion_interact_create
      description: |-
        API view for interacting with AI Companions.
        Manages session memory and user quotas.
      tags:
      - api
      responses:
        '200':
          description: No response body
  /api/v1/config/:
    get:
      operationId: api_v1_config_retrieve
      description: |-
        Configuration publique de l'app (type frontend ``AppConfig``).

        Porte aussi le mode maintenance : le frontend polle cet endpoint pendant
        la maintenance pour détecter la sortie, d'où le throttle minute-seulement
        (le day-cap anonyme par défaut couperait le poll) et son exemption dans
        ``MaintenanceModeMiddleware``.
      tags:
      - api
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/curation/:
    get:
      operationId: api_v1_curation_list
      description: Dashboard de curation pour les administrateurs.
      parameters:
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDataCurationTicketList'
          description: ''
    post:
      operationId: api_v1_curation_create
      description: Dashboard de curation pour les administrateurs.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataCurationTicket'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DataCurationTicket'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DataCurationTicket'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataCurationTicket'
          description: ''
  /api/v1/curation/{id}/:
    get:
      operationId: api_v1_curation_retrieve
      description: Dashboard de curation pour les administrateurs.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) data curation
          ticket.
        required: true
      tags:
      - api
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataCurationTicket'
          description: ''
    put:
      operationId: api_v1_curation_update
      description: Dashboard de curation pour les administrateurs.
      parameters:
      - in: path
        name: id
