{% extends 'animetix/base.html' %}
{% load static %}

{% block title %}Animetix - Le Paradoxe d'Archetyp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center">
        <h1 class="display-5 mb-4 flex items-center justify-center gap-4">
            <img src="{% static 'animetix/img/logo/white_logo.png' %}" alt="Logo" class="h-12 dark:hidden">
            <img src="{% static 'animetix/img/logo/logo.png' %}" alt="Logo" class="h-12 hidden dark:block">
            <span>Le Paradoxe d'Archetyp</span>
        </h1>
        <p class="lead mb-5">L'IA fusionne deux <strong>{{ media_type }}s</strong> secrets. Trouvez l'intrus !</p>
        
        <div class="card p-4 shadow-sm">
            <form action="{% url 'paradox' %}" method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Langue du scénario :</label>
                    <select name="language" class="form-select form-select-lg">
                        <option value="Français">Français</option>
                        <option value="English">English</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-dark btn-lg w-100 py-3">
                    Lancer le Paradoxe
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
