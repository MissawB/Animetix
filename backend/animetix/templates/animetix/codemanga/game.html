{% extends 'animetix/base.html' %}
{% load static %}

{% block title %}Matrix {{ room_code }} - Code Manga{% endblock %}

{% block extra_css %}
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Roboto', sans-serif;
        background-color: #111 !important;
        background-image: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 4px,
            rgba(255, 255, 255, 0.02) 4px,
            rgba(255, 255, 255, 0.02) 8px
        ) !important;
    }

    .panel-inset { box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
    .text-shadow-tactical { text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }
    
    .btn-3d {
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.2), 0 3px 5px rgba(0, 0, 0, 0.5);
        transition: all 0.1s ease;
    }
    .btn-3d:active { transform: translateY(1px); }

    /* UNIFIED COMPACT CARD DESIGN */
    .card-matrix {
        height: 70px;
        position: relative;
        border-radius: 12px;
        background: #ebcca4;
        border: 2px solid #9c754d;
        box-shadow: 0 4px 0 #9c754d, 0 6px 10px rgba(0,0,0,0.4);
        cursor: pointer;
        overflow: hidden;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card-matrix:hover:not(.revealed) { transform: translateY(-2px); filter: brightness(1.1); }
    .card-matrix:active:not(.revealed) { transform: translateY(3px); box-shadow: 0 1px 0 #9c754d; }

    .card-bg-img {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; opacity: 0.15; filter: grayscale(1);
        transition: all 0.3s ease;
    }
    .card-matrix:hover:not(.revealed) .card-bg-img { opacity: 0.45; filter: grayscale(0); }

    .card-overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 5px; background: rgba(0,0,0,0.1);
        z-index: 10;
    }

    .card-title-en { font-weight: 900; text-transform: uppercase; color: white; line-height: 1; text-align: center; }
    .card-title-jp { font-size: 0.5rem; font-weight: 700; color: #ffc107; opacity: 0.6; margin-top: 2px; }

    /* STATES */
    .revealed { transform: none !important; box-shadow: none !important; cursor: default; }
    .revealed .card-bg-img { opacity: 0.3; filter: grayscale(0); }
    .role-blue { background: linear-gradient(180deg, #1ea3f0 0%, #0c82c9 100%) !important; border-color: #6bbbf2 !important; }
    .role-red { background: linear-gradient(180deg, #ff6b4a 0%, #eb4924 100%) !important; border-color: #ffb199 !important; }
    .role-neutral { background: linear-gradient(180deg, #94a3b8 0%, #475569 100%) !important; border-color: #cbd5e1 !important; }
    .role-assassin { background: #000 !important; border-color: #ffc107 !important; }

    /* SPYMASTER INDICATORS */
    .spymaster-border-blue { border: 4px solid #1ea3f0 !important; }
    .spymaster-border-red { border: 4px solid #ff6b4a !important; }
    .spymaster-border-neutral { border: 4px solid #94a3b8 !important; }
    .spymaster-border-assassin { border: 4px solid #ffc107 !important; }

    .bg-blue-team { background: linear-gradient(180deg, #1ea3f0 0%, #0c82c9 100%); }
    .bg-red-team { background: linear-gradient(180deg, #ff6b4a 0%, #eb4924 100%); }
    .bg-dark-panel { background: linear-gradient(180deg, #555555 0%, #2a2a2a 100%); }
    .bg-btn-green { background: linear-gradient(180deg, #2ae016 0%, #17a306 100%); border: 2px solid #54f043; }

    .player-list-pill {
        background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px 10px;
        font-size: 0.7rem; font-weight: 800; margin-bottom: 3px;
        display: flex; align-items: center; gap: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div id="game-matrix" class="min-h-screen flex flex-col text-white pb-6">

    <!-- COMPACT HEADER -->
    <header class="flex justify-center items-center mb-4 relative pt-2">
        <div id="turn-indicator-box">
            <h1 class="text-xl font-black tracking-widest uppercase italic" id="turn-text">Liaison Matrix...</h1>
        </div>
        <button class="absolute right-4 w-8 h-8 rounded-full bg-green-600 border-2 border-green-400 text-white font-bold flex items-center justify-center btn-3d opacity-50 hover:opacity-100 transition">?</button>
    </header>

    <main class="flex-1 flex gap-4 w-full max-w-[1700px] mx-auto px-2">
        
        <!-- BLUE SIDEBAR (SHRUNK) -->
        <div class="w-44 flex flex-col gap-3">
            <div class="bg-blue-team border-2 border-white/20 rounded-2xl p-3 flex flex-col panel-inset">
                <h3 class="text-center font-black tracking-widest text-[8px] opacity-60 uppercase mb-2">Team Blue</h3>
                <div id="blue-players" class="flex-grow-1 overflow-y-auto max-h-40"></div>
                <button onclick="pickSlot('blue', 'operative')" class="w-full bg-btn-green py-1.5 rounded-full font-black text-[9px] btn-3d mt-2 uppercase">Join</button>
            </div>

            <div class="flex items-center justify-between px-3 bg-blue-team/20 border border-blue-500/30 rounded-xl py-2">
                <span class="font-black text-3xl italic" id="blue-score">0</span>
                <span class="text-[9px] font-bold opacity-40 uppercase">Targets</span>
            </div>
            
            <div class="flex-1"></div>
            <button onclick="startGame()" class="py-2 rounded-full border border-white/10 text-[8px] font-black uppercase tracking-widest opacity-20 hover:opacity-100 transition-all">Re-Sync</button>
        </div>

        <!-- THE MATRIX (EXPANDED) -->
        <div class="flex-1">
            <div id="game-grid" class="grid grid-cols-5 gap-2 bg-black/40 p-3 rounded-3xl border border-white/5">
                <!-- GRID -->
            </div>
        </div>

        <!-- RED SIDEBAR (SHRUNK) -->
        <div class="w-44 flex flex-col gap-3">
            <div class="bg-red-team border-2 border-white/20 rounded-2xl p-3 flex flex-col panel-inset">
                <h3 class="text-center font-black tracking-widest text-[8px] opacity-60 uppercase mb-2">Team Red</h3>
                <div id="red-players" class="flex-grow-1 overflow-y-auto max-h-40"></div>
                <button onclick="pickSlot('red', 'operative')" class="w-full bg-btn-green py-1.5 rounded-full font-black text-[9px] btn-3d mt-2 uppercase">Join</button>
            </div>

            <div class="flex items-center justify-between px-3 bg-red-team/20 border border-red-500/30 rounded-xl py-2">
                <span class="text-[9px] font-bold opacity-40 uppercase">Targets</span>
                <span class="font-black text-3xl italic" id="red-score">0</span>
            </div>

            <div class="flex-1 bg-black/20 border border-white/5 rounded-2xl p-3 overflow-hidden">
                <div class="flex justify-between items-center text-[8px] font-black opacity-30 mb-2 uppercase"><span>Logs</span> <i class="bi bi-cpu"></i></div>
                <div id="game-log" class="text-[8px] font-bold text-white/30 space-y-1"></div>
            </div>
        </div>
        
    </main>
</div>

<!-- MODAL -->
<div id="winner-modal" class="d-none animate__animated animate__zoomIn position-fixed top-50 start-50 translate-middle z-[6000]" style="width: 90%; max-width: 500px;">
    <div class="bg-dark-panel border-4 border-yellow-500 p-10 text-center rounded-[3rem] shadow-2xl">
        <h1 class="display-1 mb-4">🏆</h1>
        <h2 class="text-3xl font-black mb-8 text-white uppercase italic tracking-tighter" id="winner-text"></h2>
        <div class="flex gap-3">
            <button onclick="startGame()" class="flex-1 bg-btn-green py-3 rounded-full text-sm font-black uppercase tracking-widest text-white btn-3d">New Game</button>
            <a href="{% url 'codemanga_room' room_code %}" class="flex-1 bg-white/10 py-3 rounded-full text-sm font-black uppercase tracking-widest text-white btn-3d flex items-center justify-center">Lobby</a>
        </div>
    </div>
</div>

<script>
    const roomCode = "{{ room_code }}";
    const wsUrl = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws/codemanga/${roomCode}/`;
    let socket = new WebSocket(wsUrl);
    let myRole = localStorage.getItem('cm_role');
    let myTeam = localStorage.getItem('cm_team');
    let myName = localStorage.getItem('cm_name') || "Agent";

    socket.onopen = () => socket.send(JSON.stringify({action: 'set_player', name: myName, team: myTeam, role: myRole}));

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'state') {
            const room = data.room || data.message;
            if (room.state === 'lobby') window.location.href = `{% url 'codemanga_room' room_code %}`;
            else updateUI(room, data.my_role, data.my_team);
        }
    };

    function updateUI(room, role, team) {
        myRole = role; myTeam = team;
        document.getElementById('blue-score').innerText = 9 - room.blue_score;
        document.getElementById('red-score').innerText = 8 - room.red_score;

        const turnText = document.getElementById('turn-text');
        turnText.innerText = `Tour de l'équipe ${room.turn === 'blue' ? 'Bleue' : 'Rouge'}`;
        turnText.style.color = room.turn === 'blue' ? '#1ea3f0' : '#eb4924';

        // Compact Player Lists
        const blueP = document.getElementById('blue-players');
        const redP = document.getElementById('red-players');
        blueP.innerHTML = ''; redP.innerHTML = '';
        room.players.forEach(p => {
            if (!p.team) return;
            const div = document.createElement('div');
            div.className = 'player-list-pill' + (p.name === myName ? ' border border-warning' : '');
            div.innerHTML = `<span class="truncate">${p.name}</span> <span class="ml-auto opacity-40 text-[6px]">${p.role === 'spymaster' ? 'SPY' : 'AGT'}</span>`;
            if (p.team === 'blue') blueP.appendChild(div); else redP.appendChild(div);
        });

        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        room.grid.forEach((card, idx) => {
            const col = document.createElement('div');
            let stateClass = "";
            let borderClass = "";
            
            if (card.revealed) stateClass = `revealed role-${card.role}`;
            else if (myRole === 'spymaster') borderClass = `spymaster-border-${card.role}`;

            col.innerHTML = `
                <div class="card-matrix ${stateClass} ${borderClass}" onclick="clickCard(${idx})">
                    ${card.image ? `<img src="${card.image}" class="card-bg-img" onerror="this.style.display='none'">` : ''}
                    <div class="card-overlay">
                        <div class="card-title-en text-[9px] md:text-[11px] text-shadow-tactical">${card.title_en}</div>
                        <div class="card-title-jp text-shadow-tactical">${card.title_jp}</div>
                    </div>
                </div>
            `;
            grid.appendChild(col);
        });

        if (room.winner) {
            document.getElementById('winner-modal').classList.remove('d-none');
            document.getElementById('winner-text').innerText = `TEAM ${room.winner.toUpperCase()} VICTORIEUSE`;
        } else document.getElementById('winner-modal').classList.add('d-none');
    }

    function pickSlot(team, role) {
        myTeam = team; myRole = role;
        localStorage.setItem('cm_team', team); localStorage.setItem('cm_role', role);
        socket.send(JSON.stringify({action: 'set_player', name: myName, team: team, role: role}));
    }

    function startGame() { socket.send(JSON.stringify({action: 'start_game'})); }
    function clickCard(idx) { if (myRole === 'spymaster') return; socket.send(JSON.stringify({action: 'click_card', index: idx})); }
</script>
{% endblock %}
