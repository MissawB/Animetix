# .github/dependabot.yml
version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/" # Location of `requirements.txt`
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "fix"
      include: "scope"
    # Allow up to 5 pull requests for pip dependencies
    open-pull-requests-limit: 5

  # JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/frontend" # Location of `package.json` and `package-lock.json`
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "fix"
      include: "scope"
    # Allow up to 5 pull requests for npm dependencies
    open-pull-requests-limit: 5

  # GitHub Actions used in workflows (keeps action versions current, e.g.
  # actions/setup-python, actions/checkout — avoids the v4/v5 drift)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "fix"
      include: "scope"
    open-pull-requests-limit: 5
