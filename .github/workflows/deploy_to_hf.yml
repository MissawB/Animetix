name: Sync to Hugging Face

# Keeps the Hugging Face Spaces (animetix-web + animetix-brain) as an
# always-current, free backup mirror of the Cloud Run deployment. Triggers when
# app code lands on main (not on doc-only pushes), plus a manual button.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'requirements.txt'
      - 'deploy/**'
      - 'scripts/deploy/huggingface/**'
      - '.github/workflows/deploy_to_hf.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # data/processed & data/artifacts JSON are Git LFS; without this the
          # Space would ship pointer stubs and sync_catalog would fail.
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/deploy/huggingface/hf_deploy.py
