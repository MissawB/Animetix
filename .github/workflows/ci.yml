name: Animetix CI/CD Pipeline

on:
  # Run the pipeline ONLY when promoting toward an environment:
  #  - a PR targeting dev/main is the intent to promote (the gate before merge,
  #    and what fires promote-to-dev);
  #  - a push to dev fires promote-to-prod, a push to main is prod itself.
  # No schedule/feature-branch triggers: CI runs only on a dev/prod promotion.
  pull_request:
    branches: [ dev, main ]
  push:
    branches: [ dev, main ]
  workflow_dispatch: # manual escape hatch (e.g. re-run a promotion)

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Tools
      # Pin black so CI formatting matches local (black's formatting changes
      # between releases; an unpinned install drifted from the committed style).
      run: pip install ruff==0.15.17 black==26.5.1 mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        # Run from backend/ so first-party imports (core.*, adapters.*) resolve
        # to single module names; config (incl. type-debt baseline) is in pyproject.
        cd backend && mypy . --config-file ../pyproject.toml

  docker-build:
    name: Validate Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Build Image
      run: docker build -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    # Free disk space BEFORE pulling images / installing the heavy ML stack,
    # otherwise the runner (~14 GB free) runs out of space.
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Start Services
      run: docker compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir pytest-cov
    - name: Run Pytest
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        # Dummy key forces GoogleGenAIAdapter onto the Developer-API path instead
        # of Vertex AI, whose client init otherwise blocks on the GCP metadata
        # server (unreachable on CI) and makes the suite take 40+ minutes.
        GEMINI_API_KEY: ci-dummy-key
      # Exclude integration tests that need services absent from this job
      # (live LLM/ollama, a running app server, subprocess-based commands).
      # --durations surfaces the slowest tests so we can keep an eye on runtime.
      run: python -m pytest -m "not integration" --durations=25 --cov=backend --cov-report=term-missing --cov-report=xml

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt
    - name: Run Regression Benchmark
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        BRAIN_API_KEY: ${{ secrets.BRAIN_API_KEY }}
        ACCURACY_THRESHOLD: "0.50"
      run: python backend/pipeline/evaluation/regression_benchmark.py --threshold 0.50

  frontend-test:
    name: Frontend Accessibility & E2E
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps chromium
    - name: Run A11y Tests
      run: cd frontend && npx playwright test e2e/a11y.spec.ts
      env:
        CI: true

  promote-to-dev:
    name: Promote to Development
    needs: [lint, docker-build, test, perf-test, frontend-test]
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && success()
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: write # push the promoted code to the dev branch
      id-token: write # mint the OIDC token for Workload Identity Federation (GCP auth)
    env:
      GCP_PROJECT: animetix
      GCP_REGION: europe-west9
      DEV_SERVICE: animetix-web-dev
      DEV_IMAGE: europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev
      # Same runtime SA + VPC connector as prod so dev can reach the (private) DB/Redis.
      RUNTIME_SA: 836616987676-compute@developer.gserviceaccount.com
      VPC_CONNECTOR: animetix-vpc-conn
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Prefer a PAT (PROMOTE_TOKEN): it isn't capped by the repo's read-only
        # Actions setting AND its push to `dev` re-triggers CI so promote-to-prod
        # fires. Falls back to GITHUB_TOKEN (needs repo "Read and write" + won't chain).
        token: ${{ secrets.PROMOTE_TOKEN || secrets.GITHUB_TOKEN }}
    - name: Push to Dev Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin ${{ github.event.pull_request.head.ref }}:temp-pr-branch
        git checkout dev || git checkout -b dev origin/main
        git merge temp-pr-branch --ff-only
        git push origin dev

    # --- Deploy the promoted code to the dev Cloud Run environment ---------------
    # Reuses the WIF auth already configured for the Gemini workflows
    # (vars.GCP_WIF_PROVIDER / vars.SERVICE_ACCOUNT_EMAIL). The auth service account
    # needs: roles/cloudbuild.builds.editor, roles/run.admin, and
    # roles/iam.serviceAccountUser on RUNTIME_SA. animetix-web-dev is created on the
    # first deploy; it reuses the prod Secret Manager secrets (see --set-secrets).
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
        service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    - name: Build & push dev image (Cloud Build)
      run: |
        gcloud builds submit \
          --project "$GCP_PROJECT" \
          --config deploy/cloudbuild.dev.yaml \
          --substitutions=_TAG=${{ github.sha }} \
          .
    - name: Deploy to Cloud Run (animetix-web-dev)
      run: |
        gcloud run deploy "$DEV_SERVICE" \
          --project "$GCP_PROJECT" \
          --region "$GCP_REGION" \
          --image "$DEV_IMAGE:${{ github.sha }}" \
          --service-account "$RUNTIME_SA" \
          --vpc-connector "$VPC_CONNECTOR" \
          --vpc-egress private-ranges-only \
          --port 7860 \
          --cpu 2 --memory 4Gi \
          --max-instances 3 \
          --cpu-boost \
          --allow-unauthenticated \
          --set-env-vars "^@^DJANGO_ENV=production@ALLOWED_HOSTS=*.run.app,localhost,127.0.0.1" \
          --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,BRAIN_API_KEY=BRAIN_API_KEY:latest,TMDB_API_KEY=TMDB_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,IGDB_CLIENT_ID=IGDB_CLIENT_ID:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,HF_TOKEN=HF_TOKEN:latest,IGDB_CLIENT_SECRET=IGDB_CLIENT_SECRET:latest,WANDB_API_KEY=WANDB_API_KEY:latest"
    - name: Show dev service URL
      run: |
        gcloud run services describe "$DEV_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --format="value(status.url)"

  promote-to-prod:
    name: Promote to Production
    needs: [lint, docker-build, test, perf-test, frontend-test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PROMOTE_TOKEN || secrets.GITHUB_TOKEN }}
    - name: Push to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main || true
        git checkout main || git checkout master
        git merge ${{ github.sha }} --ff-only
        git push origin HEAD
