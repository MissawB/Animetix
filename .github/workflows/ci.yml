name: Animetix CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly at midnight on Mondays
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Tools
      run: pip install ruff black isort mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        isort --check .
        mypy backend/

  docker-build:
    name: Validate Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Image
      run: docker build -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Start Services
      run: docker-compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov
    - name: Run Pytest
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
      run: python -m pytest --cov=backend --cov-report=term-missing --cov-report=xml

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: pip install -r requirements.txt
    - name: Run Benchmark
      run: python scripts/mlops_rag_eval.py --fast-mode

  promote-to-dev:
    name: Promote to Development
    needs: [lint, docker-build, test, perf-test]
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && success()
    runs-on: ubuntu-latest
    environment: development
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Push to Dev Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin ${{ github.event.pull_request.head.ref }}:temp-pr-branch
        git checkout dev || git checkout -b dev origin/main
        git merge temp-pr-branch --ff-only
        git push origin dev

  promote-to-prod:
    name: Promote to Production
    needs: [lint, docker-build, test, perf-test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Push to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main || true
        git checkout main || git checkout master
        git merge ${{ github.sha }} --ff-only
        git push origin HEAD
