name: Animetix CI/CD Pipeline

on:
  # Prod-only pipeline. On push/PR to main it runs the checks only.
  # A manual run from the Actions tab ("Run workflow") runs the checks AND, if the
  # deploy box stays ticked, ends with a deploy to the prod Cloud Run service.
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Deploy to prod (animetix-web) after the checks pass'
        type: boolean
        default: false # opt-in: a prod deploy must be ticked explicitly
      deploy_brain:
        description: 'Deploy brain to prod (animetix-brain) after the checks pass'
        type: boolean
        default: false # opt-in: a brain deploy must be ticked explicitly
      run_perf:
        description: 'Run the RAG performance benchmark (calls billed Gemini/OpenAI)'
        type: boolean
        default: false # opt-in: don't bill LLM APIs on a plain dispatch

# Cancel superseded runs on the same ref (e.g. rapid PR pushes) to stop redundant
# work piling up. The event_name is part of the group so a push to main never
# cancels an in-flight manual deploy (workflow_dispatch) on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Tools
      # Pin black so CI formatting matches local (black's formatting changes
      # between releases; an unpinned install drifted from the committed style).
      run: pip install ruff==0.15.17 black==26.5.1 mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        # Run from backend/ so first-party imports (core.*, adapters.*) resolve
        # to single module names; config (incl. type-debt baseline) is in pyproject.
        cd backend && mypy . --config-file ../pyproject.toml

  docker-build:
    name: Validate Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Build Image
      run: docker build --pull -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    # Deliberately NOT gated on docker-build: a slow or broken image build must
    # not starve unit-test feedback. docker-build remains a hard gate for
    # deploy-to-prod via its own `needs` entry.
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
    # Free disk space BEFORE pulling images / installing the heavy ML stack,
    # otherwise the runner (~14 GB free) runs out of space.
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Start Services
      run: docker compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        # Cache pip's wheel cache (~/.cache/pip, untouched by Free Disk Space) so the
        # heavy torch CPU wheel + requirements.txt aren't re-downloaded
        # every run. Shared across the test/integration/perf jobs via the same key.
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        # pytest + pytest-cov live in requirements-dev.txt (kept out of the prod lock).
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run Pytest
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        # Dummy key forces GoogleGenAIAdapter onto the Developer-API path instead
        # of Vertex AI, whose client init otherwise blocks on the GCP metadata
        # server (unreachable on CI) and makes the suite take 40+ minutes.
        GEMINI_API_KEY: ci-dummy-key
      # Exclude integration tests that need services absent from this job
      # (live LLM/ollama, a running app server, subprocess-based commands).
      # --durations surfaces the slowest tests so we can keep an eye on runtime.
      # --cov-fail-under is a HARD gate: the job (and thus the prod deploy) fails
      # below it. Ratcheted 75 -> 76 on 2026-07-11 after covering the critical
      # blind spots the global was masking (alert_service and validation_gate were
      # at 0%, quiz_who 23%, animinator 26% — cf. docs/HISTORY.md). Raise it again
      # as coverage grows; never lower it to make a red build green.
      run: python -m pytest -m "not integration" --durations=25 --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=76
    - name: Upload coverage to Codecov
      # Runs even when the coverage gate fails so the report is always published.
      # Non-blocking: never fails the job on upload/token issues.
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    - name: Check OpenAPI schema is up to date
      # The committed schema.yaml is the source of truth for the frontend types
      # (frontend/src/types/api.d.ts, via `npm run generate:api`). A serializer or
      # route change that isn't re-exported leaves the front typed against a stale
      # contract. Regenerate here and fail if it drifts — the schema is
      # deterministic (fixed VERSION, no timestamps), so any diff is real. Runs
      # without SENTRY_DSN, so Django boots without pulling the torch/langchain
      # stack. `git diff` honours .gitattributes, so pure line-ending differences
      # never trip it.
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        # containers/inference.py runs validate_inference_config() at import,
        # which requires a well-formed BRAIN_API_URL. The pytest step gets this
        # from tests/conftest.py, but `manage.py spectacular` doesn't load
        # conftest, so set a dummy here or Django won't boot.
        BRAIN_API_URL: 'http://localhost:8001'
      run: |
        python backend/api/manage.py spectacular --file schema.yaml
        git diff --exit-code schema.yaml || {
          echo "::error::schema.yaml is stale. Run 'python scripts/sync_api.py' and commit schema.yaml + frontend/src/types/api.d.ts."
          exit 1
        }

  test-windows:
    name: Run Unit Tests (Windows)
    # Couvre l'angle mort Windows : toute la logique anti-pollution async du
    # conftest cible Windows (WindowsProactorEventLoopPolicy), jamais exercée en CI.
    # Job SÉPARÉ (pas une matrice sur `test`) pour NE PAS renommer le check requis
    # "Run Unit Tests". Bloquant : run vert confirmé sur la suite complète le
    # 2026-07-17 (~33 min). À ajouter aux required checks (Settings→Branches) pour
    # qu'il gate réellement les merges. Pas de services Linux : la suite unitaire
    # tourne en SQLite + LocMemCache (animetix_project.test_settings), donc pas de
    # docker-compose (indisponible sur les runners windows-latest).
    needs: [lint]
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run Pytest
      shell: bash
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ci-dummy-key
      # Pas de --cov : le gate de couverture (76) reste sur la leg Linux
      # "Run Unit Tests". Cette leg valide seulement que la suite PASSE sur Windows.
      run: python -m pytest -m "not integration" --durations=25

  integration-test:
    name: Backend Integration (blocking)
    needs: [lint]
    continue-on-error: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
    # `ollama serve` runs as the runner user, so models live in ~/.ollama —
    # cache it: the qwen3:0.6b pull (~500 MB from the ollama registry) was
    # re-downloaded on every run. With a warm cache the pull below is a fast
    # manifest check. Static key: model blobs are content-addressed.
    - name: Cache Ollama models
      uses: actions/cache@v6
      with:
        path: ~/.ollama
        key: ollama-models-qwen3-0.6b
    - name: Start Ollama
      run: |
        ollama serve &
    - name: Wait for Ollama
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "Ollama is ready!"
            break
          fi
          sleep 1
        done
    - name: Pull Ollama Model
      run: |
        ollama pull qwen3:0.6b
    - name: Start Services
      run: docker compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run integration tests
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ci-dummy-key
        LLM_API_BASE: 'http://localhost:11434'
        LLM_MODEL_NAME: 'qwen3:0.6b'
      run: python -m pytest -m integration --durations=25

  perf-test:
    name: RAG Performance Test
    needs: test
    # Calls REAL Gemini/OpenAI APIs (cost + flakiness). Opt-in only: runs when
    # `run_perf` is ticked OR a web deploy (`deploy_to_prod`) is requested — the
    # web serves the RAG, so its deploy keeps the accuracy gate. A plain manual
    # dispatch (checks only) or a brain-only deploy no longer bills the LLM APIs;
    # `deploy-brain` accordingly dropped this job from its `needs`. push/PR skip.
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (inputs.run_perf || inputs.deploy_to_prod)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt
    - name: Install Dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Run Regression Benchmark
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        BRAIN_API_KEY: ${{ secrets.BRAIN_API_KEY }}
        ACCURACY_THRESHOLD: "0.50"
      run: python backend/pipeline/evaluation/regression_benchmark.py --threshold 0.50

  frontend-checks:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    # Type errors compile-pass under Vite/rolldown (no tsc in the build), so this
    # is the only gate that catches them before they ship. ESLint follows.
    - name: Type Check
      run: cd frontend && npm run check-types
    - name: Lint
      run: cd frontend && npm run lint
    # Runs the jsdom unit project (the storybook/browser project is excluded via
    # --project unit, so no Playwright browser is needed here). The v8 coverage
    # gate uses the ratchet thresholds in vite.config.ts — keep raising them.
    - name: Unit Tests + Coverage
      run: cd frontend && npm run test:coverage
    - name: Upload frontend coverage to Codecov
      # Runs even if the coverage gate fails so the report is always published.
      # Non-blocking: never fails the job on upload/token issues.
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: frontend/coverage/lcov.info
        flags: frontend
        token: ${{ secrets.CODECOV_TOKEN }}

  frontend-test:
    name: Frontend Accessibility & E2E
    # No `needs`: this job never touches the Docker image (npm + Playwright
    # only) — the old docker-build dependency just delayed e2e feedback.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps chromium
    - name: Run E2E Tests
      run: cd frontend && npm run test:e2e
      env:
        CI: true
    - name: Run Storybook Tests
      run: cd frontend && npm run test:storybook
      env:
        CI: true
    - name: Upload Playwright artifacts
      # Toujours uploadé : le rapport HTML + (en cas d'échec) traces/screenshots/vidéos
      # de test-results/, pour diagnostiquer les échecs e2e sans reproduire en local.
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
        if-no-files-found: ignore

  deploy-to-prod:
    name: Deploy to Production
    needs: [lint, docker-build, test, integration-test, perf-test, frontend-checks, frontend-test]
    # Manual trigger only ("Run workflow"), only from the protected main branch,
    # and only when the deploy box is explicitly ticked. Never runs on push/PR.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_to_prod && success()
    runs-on: ubuntu-latest
    # Add required reviewers on the "production" environment (repo Settings >
    # Environments) to gate this deploy behind a manual approval.
    environment: production
    permissions:
      contents: read
      id-token: write # mint the OIDC token for Workload Identity Federation (GCP auth)
    env:
      GCP_PROJECT: animetix
      GCP_REGION: europe-west9
      PROD_SERVICE: animetix-web
      PROD_IMAGE: europe-west9-docker.pkg.dev/animetix/animetix-repo/web
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      # data/processed/*.json & data/artifacts/* are Git LFS. Without lfs:true the
      # checkout has pointer stubs, Cloud Build ships those into the image, and
      # sync_catalog then fails: json.load on a pointer -> "Expecting value line 1".
      with:
        lfs: true
    # Reuses the WIF auth already configured for the Gemini workflows. The auth
    # service account needs: roles/cloudbuild.builds.editor, roles/run.admin, and
    # roles/iam.serviceAccountUser on the prod runtime service account.
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
        service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    - name: Build & push prod image (Cloud Build)
      # Tag the image with the exact commit SHA so the deploy below pins this
      # build's artifact, not the mutable :latest tag.
      # _BUILD_TARGET=web: this job only `gcloud run deploy`s animetix-web, so
      # build ONLY the web image. Building `all` also rebuilds the brain and the
      # heavy Dataflow image — the latter overruns the Cloud Build step timeout
      # (context deadline exceeded) and the >1h build outlives the Workload
      # Identity token (STS refresh then fails), so `all` never completes. Brain
      # and Dataflow have their own targeted builds when they actually change.
      run: |
        gcloud builds submit \
          --project "$GCP_PROJECT" \
          --config cloudbuild.yaml \
          --substitutions=_TAG=${{ github.sha }},_BUILD_TARGET=web \
          .
    - name: Deploy candidate revision (no traffic)
      # Minimal update: only the image changes. The service keeps its existing
      # env vars, secrets, VPC connector, scaling and port. Pinned to the SHA tag.
      # DJANGO_DB_USE_IAM=false: animetix-db authenticates the built-in `postgres`
      # user via the password in DATABASE_URL (no Cloud SQL IAM DB user exists), so
      # the prod default (IAM auth) must be disabled or every DB connect FATALs.
      #
      # --no-traffic + --tag: the new revision starts WITHOUT serving traffic,
      # reachable only through the `candidate` tag URL. Prod keeps serving the
      # previous revision until the smoke test below passes — a revision that
      # boots but fails at runtime (broken migration, missing secret) never
      # takes traffic, so there is nothing to roll back.
      run: |
        gcloud run deploy "$PROD_SERVICE" \
          --project "$GCP_PROJECT" \
          --region "$GCP_REGION" \
          --image "$PROD_IMAGE:${{ github.sha }}" \
          --update-env-vars=DJANGO_DB_USE_IAM=false \
          --no-traffic \
          --tag candidate
    - name: Smoke-test the candidate revision
      # Hits /healthz/ on the tagged revision URL (bypasses the Cloudflare
      # custom-domain worker). First request cold-starts the container, which
      # runs migrate + collectstatic before gunicorn: allow up to 5 minutes.
      run: |
        CANDIDATE_URL=$(gcloud run services describe "$PROD_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" --format=json \
          | jq -r '.status.traffic[] | select(.tag=="candidate") | .url')
        if [ -z "$CANDIDATE_URL" ]; then
          echo "::error::candidate tag URL not found on $PROD_SERVICE"
          exit 1
        fi
        echo "Smoke-testing $CANDIDATE_URL/healthz/"
        for i in $(seq 1 30); do
          body=$(curl -sS --max-time 15 "$CANDIDATE_URL/healthz/" || true)
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$CANDIDATE_URL/healthz/" || echo 000)
          if [ "$code" = "200" ]; then
            echo "Candidate healthy after $i attempt(s): $body"
            exit 0
          fi
          echo "Attempt $i/30: HTTP $code — retrying in 10s"
          sleep 10
        done
        echo "::error::candidate revision never became healthy — traffic was NOT switched, previous revision still serves prod"
        exit 1
    - name: Dump candidate logs (smoke test failed)
      if: failure()
      run: |
        gcloud logging read \
          "resource.type=cloud_run_revision AND resource.labels.service_name=$PROD_SERVICE" \
          --project "$GCP_PROJECT" --limit 80 --freshness=30m \
          --format="value(timestamp, severity, textPayload)" || true
    - name: Promote candidate to 100% traffic
      run: |
        gcloud run services update-traffic "$PROD_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --to-latest
    - name: Show prod service URL
      run: |
        gcloud run services describe "$PROD_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --format="value(status.url)"

  deploy-brain-to-prod:
    name: Deploy Brain to Production
    # No perf-test in needs: the RAG accuracy benchmark gates the web (which
    # serves the RAG), not a brain image swap — so a brain deploy no longer runs
    # (nor bills) it. The web deploy keeps perf-test in its own `needs`.
    needs: [lint, test, integration-test, frontend-checks, frontend-test]
    # Manual trigger only, from main, with the deploy_brain box explicitly ticked.
    # Independent of deploy_to_prod: you can deploy the brain without the web and
    # vice versa. The brain was previously undeployable from CI because
    # Dockerfile.brain exceeded Cloud Build's timeout; the gguf layer caching
    # added alongside this job brings it back under 10 min (warm cache).
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_brain && success()
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: animetix
      GCP_REGION: europe-west1
      BRAIN_SERVICE: animetix-brain
      BRAIN_IMAGE: europe-west9-docker.pkg.dev/animetix/animetix-repo/brain
    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        lfs: true
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
        service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    - name: Build & push brain image (Cloud Build)
      # _BUILD_TARGET=brain: only the brain image. The gguf stages hit the
      # Docker cache when the model hasn't changed (~10 min vs 2 h cold).
      run: |
        gcloud builds submit \
          --project "$GCP_PROJECT" \
          --config cloudbuild.yaml \
          --substitutions=_TAG=${{ github.sha }},_BUILD_TARGET=brain \
          .
    - name: Deploy candidate revision (no traffic)
      # GPU flags mirror deployments.yaml: L4 GPU, 4 vCPU, 16 Gi.
      # --no-traffic + --tag: the new revision starts WITHOUT serving traffic,
      # reachable only through the `candidate` tag URL.
      run: |
        gcloud run deploy "$BRAIN_SERVICE" \
          --project "$GCP_PROJECT" \
          --region "$GCP_REGION" \
          --image "$BRAIN_IMAGE:${{ github.sha }}" \
          --gpu=1 --gpu-type=nvidia-l4 \
          --cpu=4 --memory=16Gi \
          --no-traffic \
          --tag candidate
    - name: Smoke-test the candidate revision
      # Hits /health on the tagged revision URL. The brain cold-starts slower
      # than the web (Ollama + model warm-up), so allow up to 10 minutes.
      run: |
        CANDIDATE_URL=$(gcloud run services describe "$BRAIN_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" --format=json \
          | jq -r '.status.traffic[] | select(.tag=="candidate") | .url')
        if [ -z "$CANDIDATE_URL" ]; then
          echo "::error::candidate tag URL not found on $BRAIN_SERVICE"
          exit 1
        fi
        echo "Smoke-testing $CANDIDATE_URL/health"
        for i in $(seq 1 60); do
          body=$(curl -sS --max-time 15 "$CANDIDATE_URL/health" || true)
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$CANDIDATE_URL/health" || echo 000)
          if [ "$code" = "200" ]; then
            echo "Brain candidate healthy after $i attempt(s): $body"
            exit 0
          fi
          echo "Attempt $i/60: HTTP $code — retrying in 10s"
          sleep 10
        done
        echo "::error::brain candidate revision never became healthy — traffic was NOT switched"
        exit 1
    - name: Dump candidate logs (smoke test failed)
      if: failure()
      run: |
        gcloud logging read \
          "resource.type=cloud_run_revision AND resource.labels.service_name=$BRAIN_SERVICE" \
          --project "$GCP_PROJECT" --limit 80 --freshness=30m \
          --format="value(timestamp, severity, textPayload)" || true
    - name: Promote candidate to 100% traffic
      run: |
        gcloud run services update-traffic "$BRAIN_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --to-latest
    - name: Show brain service URL
      run: |
        gcloud run services describe "$BRAIN_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --format="value(status.url)"
