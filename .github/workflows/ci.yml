name: Animetix CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Tools
      run: pip install ruff black isort
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        isort --check .

  docker-build:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Image
      run: docker build -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    services:
      # We now use the specialized test composition
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Start Services
      run: docker-compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Pytest
      env:
        DATABASE_URL: postgres://animetix:secretpassword@localhost:5432/animetix_test_db
        REDIS_URL: redis://localhost:6379/1
        DJANGO_SECRET_KEY: ci-test-key
        DJANGO_DEBUG: 'False'
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
      run: python -m pytest

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: pip install -r requirements.txt
    - name: Run Benchmark
      run: python scripts/mlops_rag_eval.py --fast-mode
