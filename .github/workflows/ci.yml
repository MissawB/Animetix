name: Animetix CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly at midnight on Mondays

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Tools
      run: pip install ruff black isort mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        isort --check .
        mypy backend/

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Backend Security Audit (Safety)
      run: |
        pip install safety
        safety check -r requirements.txt
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Frontend Security Audit (NPM Audit)
      working-directory: ./frontend
      run: npm audit --audit-level=high

  docker-build:
    name: Validate Docker Build
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Image
      run: docker build -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    services:
      # We now use the specialized test composition
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Start Services
      run: docker-compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Pytest
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
        DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
        NEO4J_URI: ${{ secrets.NEO4J_URI }}
        NEO4J_USER: ${{ secrets.NEO4J_USERNAME }}
        NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      run: python -m pytest

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: pip install -r requirements.txt
    - name: Run Benchmark
      run: python scripts/mlops_rag_eval.py --fast-mode
