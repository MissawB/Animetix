name: Animetix CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  schedule:
    - cron: '0 0 * * 1' # Run weekly at midnight on Mondays
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Tools
      # Pin black so CI formatting matches local (black's formatting changes
      # between releases; an unpinned install drifted from the committed style).
      run: pip install ruff==0.15.17 black==26.5.1 mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        # Run from backend/ so first-party imports (core.*, adapters.*) resolve
        # to single module names; config (incl. type-debt baseline) is in pyproject.
        cd backend && mypy . --config-file ../pyproject.toml

  docker-build:
    name: Validate Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Build Image
      run: docker build -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    # Free disk space BEFORE pulling images / installing the heavy ML stack,
    # otherwise the runner (~14 GB free) runs out of space.
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Start Services
      run: docker-compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt
        pip install --no-cache-dir pytest-cov
    - name: Run Pytest
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
      # Exclude integration tests that need services absent from this job
      # (live LLM/ollama, a running app server, subprocess-based commands).
      run: python -m pytest -m "not integration" --cov=backend --cov-report=term-missing --cov-report=xml

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Dependencies
      run: |
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt
    - name: Run Regression Benchmark
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        BRAIN_API_KEY: ${{ secrets.BRAIN_API_KEY }}
        ACCURACY_THRESHOLD: "0.50"
      run: python backend/pipeline/evaluation/regression_benchmark.py --threshold 0.50

  frontend-test:
    name: Frontend Accessibility & E2E
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps chromium
    - name: Run A11y Tests
      run: cd frontend && npx playwright test e2e/a11y.spec.ts
      env:
        CI: true

  promote-to-dev:
    name: Promote to Development
    needs: [lint, docker-build, test, perf-test, frontend-test]
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'dev' && success()
    runs-on: ubuntu-latest
    environment: development
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Push to Dev Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin ${{ github.event.pull_request.head.ref }}:temp-pr-branch
        git checkout dev || git checkout -b dev origin/main
        git merge temp-pr-branch --ff-only
        git push origin dev

  promote-to-prod:
    name: Promote to Production
    needs: [lint, docker-build, test, perf-test, frontend-test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push' && success()
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Push to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main || true
        git checkout main || git checkout master
        git merge ${{ github.sha }} --ff-only
        git push origin HEAD
