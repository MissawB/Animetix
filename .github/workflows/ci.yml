name: Animetix CI/CD Pipeline

on:
  # Prod-only pipeline. On push/PR to main it runs the checks only.
  # A manual run from the Actions tab ("Run workflow") runs the checks AND, if the
  # deploy box stays ticked, ends with a deploy to the prod Cloud Run service.
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'Deploy to prod (animetix-web) after the checks pass'
        type: boolean
        default: false # opt-in: a prod deploy must be ticked explicitly

# Cancel superseded runs on the same ref (e.g. rapid PR pushes) to stop redundant
# work piling up. The event_name is part of the group so a push to main never
# cancels an in-flight manual deploy (workflow_dispatch) on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Tools
      # Pin black so CI formatting matches local (black's formatting changes
      # between releases; an unpinned install drifted from the committed style).
      run: pip install ruff==0.15.17 black==26.5.1 mypy
    - name: Run Checks
      run: |
        ruff check .
        black --check .
        # Run from backend/ so first-party imports (core.*, adapters.*) resolve
        # to single module names; config (incl. type-debt baseline) is in pyproject.
        cd backend && mypy . --config-file ../pyproject.toml

  docker-build:
    name: Validate Docker Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Build Image
      run: docker build --pull -t test-build -f deploy/Dockerfile .

  test:
    name: Run Unit Tests
    needs: [lint, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    # Free disk space BEFORE pulling images / installing the heavy ML stack,
    # otherwise the runner (~14 GB free) runs out of space.
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Start Services
      run: docker compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        # Cache pip's wheel cache (~/.cache/pip, untouched by Free Disk Space) so the
        # heavy torch/torchvision CPU wheels + requirements.txt aren't re-downloaded
        # every run. Shared across the test/integration/perf jobs via the same key.
        cache: 'pip'
        cache-dependency-path: requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        # pytest-cov is pinned in requirements.txt; no separate install needed.
        pip install -r requirements.txt
    - name: Run Pytest
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        # Dummy key forces GoogleGenAIAdapter onto the Developer-API path instead
        # of Vertex AI, whose client init otherwise blocks on the GCP metadata
        # server (unreachable on CI) and makes the suite take 40+ minutes.
        GEMINI_API_KEY: ci-dummy-key
      # Exclude integration tests that need services absent from this job
      # (live LLM/ollama, a running app server, subprocess-based commands).
      # --durations surfaces the slowest tests so we can keep an eye on runtime.
      # --cov-fail-under=75 is a HARD gate: the job (and thus the prod deploy)
      # fails below 75% line coverage. Coverage now sits at ~75.3% (cleared by the
      # coverage-consolidation work, cf. docs/HISTORY.md), so the gate is live and
      # passing — it now guards against regressions rather than tracking a backlog.
      run: python -m pytest -m "not integration" --durations=25 --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=75
    - name: Upload coverage to Codecov
      # Runs even when the coverage gate fails so the report is always published.
      # Non-blocking: never fails the job on upload/token issues.
      if: always()
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  integration-test:
    name: Backend Integration (blocking)
    needs: [lint]
    continue-on-error: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
    - name: Start Ollama
      run: |
        ollama serve &
    - name: Wait for Ollama
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:11434/api/tags > /dev/null; then
            echo "Ollama is ready!"
            break
          fi
          sleep 1
        done
    - name: Pull Ollama Model
      run: |
        ollama pull qwen2.5:0.5b
    - name: Start Services
      run: docker compose -f deploy/docker-compose.test.yml up -d
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: requirements.txt
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    - name: Run integration tests
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ci-dummy-key
        LLM_API_BASE: 'http://localhost:11434'
        LLM_MODEL_NAME: 'qwen2.5:0.5b'
      run: python -m pytest -m integration --durations=25

  perf-test:
    name: RAG Performance Test
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: requirements.txt
    - name: Install Dependencies
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt
    - name: Run Regression Benchmark
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        REDIS_URL: redis://localhost:6380
        DJANGO_SECRET_KEY: test-secret-key
        DJANGO_DEBUG: "True"
        NEO4J_URI: bolt://localhost:7687
        NEO4J_USER: neo4j
        NEO4J_PASSWORD: password
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        BRAIN_API_KEY: ${{ secrets.BRAIN_API_KEY }}
        ACCURACY_THRESHOLD: "0.50"
      run: python backend/pipeline/evaluation/regression_benchmark.py --threshold 0.50

  frontend-checks:
    name: Frontend Lint & Types
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    # Type errors compile-pass under Vite/rolldown (no tsc in the build), so this
    # is the only gate that catches them before they ship. ESLint follows.
    - name: Type Check
      run: cd frontend && npm run check-types
    - name: Lint
      run: cd frontend && npm run lint
    # Runs the jsdom unit project (the storybook/browser project is excluded via
    # --project unit, so no Playwright browser is needed here). The v8 coverage
    # gate uses the ratchet thresholds in vite.config.ts — keep raising them.
    - name: Unit Tests + Coverage
      run: cd frontend && npm run test:coverage
    - name: Upload frontend coverage to Codecov
      # Runs even if the coverage gate fails so the report is always published.
      # Non-blocking: never fails the job on upload/token issues.
      if: always()
      uses: codecov/codecov-action@v4
      with:
        files: frontend/coverage/lcov.info
        flags: frontend
        token: ${{ secrets.CODECOV_TOKEN }}

  frontend-test:
    name: Frontend Accessibility & E2E
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install Dependencies
      run: cd frontend && npm ci --legacy-peer-deps
    - name: Install Playwright Browsers
      run: cd frontend && npx playwright install --with-deps chromium
    - name: Run E2E Tests
      run: cd frontend && npm run test:e2e
      env:
        CI: true
    - name: Run Storybook Tests
      run: cd frontend && npm run test:storybook
      env:
        CI: true
    - name: Upload Playwright artifacts
      # Toujours uploadé : le rapport HTML + (en cas d'échec) traces/screenshots/vidéos
      # de test-results/, pour diagnostiquer les échecs e2e sans reproduire en local.
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 7
        if-no-files-found: ignore

  deploy-to-prod:
    name: Deploy to Production
    needs: [lint, docker-build, test, integration-test, perf-test, frontend-checks, frontend-test]
    # Manual trigger only ("Run workflow"), only from the protected main branch,
    # and only when the deploy box is explicitly ticked. Never runs on push/PR.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.deploy_to_prod && success()
    runs-on: ubuntu-latest
    # Add required reviewers on the "production" environment (repo Settings >
    # Environments) to gate this deploy behind a manual approval.
    environment: production
    permissions:
      contents: read
      id-token: write # mint the OIDC token for Workload Identity Federation (GCP auth)
    env:
      GCP_PROJECT: animetix
      GCP_REGION: europe-west9
      PROD_SERVICE: animetix-web
      PROD_IMAGE: europe-west9-docker.pkg.dev/animetix/animetix-repo/web
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      # data/processed/*.json & data/artifacts/* are Git LFS. Without lfs:true the
      # checkout has pointer stubs, Cloud Build ships those into the image, and
      # sync_catalog then fails: json.load on a pointer -> "Expecting value line 1".
      with:
        lfs: true
    # Reuses the WIF auth already configured for the Gemini workflows. The auth
    # service account needs: roles/cloudbuild.builds.editor, roles/run.admin, and
    # roles/iam.serviceAccountUser on the prod runtime service account.
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
        service_account: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
    - name: Build & push prod image (Cloud Build)
      # Tag the image with the exact commit SHA so the deploy below pins this
      # build's artifact, not the mutable :latest tag.
      run: |
        gcloud builds submit \
          --project "$GCP_PROJECT" \
          --config cloudbuild.yaml \
          --substitutions=_TAG=${{ github.sha }} \
          .
    - name: Deploy to Cloud Run (animetix-web)
      # Minimal update: only the image changes. The service keeps its existing
      # env vars, secrets, VPC connector, scaling and port. Pinned to the SHA tag.
      # DJANGO_DB_USE_IAM=false: animetix-db authenticates the built-in `postgres`
      # user via the password in DATABASE_URL (no Cloud SQL IAM DB user exists), so
      # the prod default (IAM auth) must be disabled or every DB connect FATALs.
      run: |
        gcloud run deploy "$PROD_SERVICE" \
          --project "$GCP_PROJECT" \
          --region "$GCP_REGION" \
          --image "$PROD_IMAGE:${{ github.sha }}" \
          --update-env-vars=DJANGO_DB_USE_IAM=false
    - name: Show prod service URL
      run: |
        gcloud run services describe "$PROD_SERVICE" \
          --project "$GCP_PROJECT" --region "$GCP_REGION" \
          --format="value(status.url)"
