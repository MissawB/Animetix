name: Animetix Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger
  pull_request:
    branches: [ main ]
    paths:
      - 'requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security_audit.yml'

jobs:
  python-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Set up Python
      uses: actions/setup-python@v4 # Changed to v4 as v5 might not be available or stable in all runners yet
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt

    - name: Static Analysis (Bandit)
      run: |
        pip install bandit
        bandit -r backend/ -ll -ii
      # -ll: logical lines
      # -ii: include low confidence

  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: Run Frontend Vulnerability Scan
      working-directory: ./frontend
      run: npm audit --audit-level=high

  container-security:
    name: Container Image Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Scan Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: deploy/Dockerfile
