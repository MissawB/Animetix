name: Animetix Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger
  pull_request:
    branches: [ main ]
    paths:
      # Code paths too: a Bandit regression in application code (or a Dockerfile
      # smell) must fail the PR, not sit until the nightly cron up to 24h later.
      - 'backend/**'
      - 'deploy/**'
      - 'requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security_audit.yml'

jobs:
  python-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    # No "Free Disk Space" step: it only existed to make room for the torch +
    # requirements install, which bandit (static) doesn't need — see below.

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    # Bandit is static AST analysis — it never imports the project, so the app's
    # dependencies (torch + requirements, ~5 min) are NOT installed here. This
    # keeps the job cheap enough to run on every backend PR (see paths above).
    - name: Static Analysis (Bandit)
      run: |
        pip install bandit
        bandit -r backend/ -ll -ii
      # -ll: logical lines
      # -ii: include low confidence

  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: Run Frontend Vulnerability Scan
      working-directory: ./frontend
      run: npm audit --audit-level=high

  container-security:
    name: Container Image Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Scan Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: deploy/Dockerfile
