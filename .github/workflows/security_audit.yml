name: Animetix Security Audit

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger
  push:
    paths:
      - 'requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security_audit.yml'

jobs:
  python-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Set up Python
      uses: actions/setup-python@v4 # Changed to v4 as v5 might not be available or stable in all runners yet
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir -r requirements.txt

    # --- SNYK SCAN DISABLED ---
    # Snyk tests require a valid SNYK_TOKEN configured in GitHub Secrets.
    # Currently disabled as the token is not available in the environment.
    # Uncomment the block below once the token is added.
    
    # - name: Snyk Python Test
    #   uses: snyk/actions/python@master # Using snyk action for python
    #   env:
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    #   with:
    #     args: --file=requirements.txt --severity-threshold=high --sarif-file-output=snyk-python.sarif
    #   continue-on-error: true

    # - name: Upload Snyk Python results to GitHub Code Scanning
    #   uses: github/codeql-action/upload-sarif@v4
    #   with:
    #     sarif_file: snyk-python.sarif
    #   if: ${{ always() && hashFiles('snyk-python.sarif') != '' }}

    - name: Static Analysis (Bandit)
      run: |
        pip install bandit
        bandit -r backend/ -ll -ii
      # -ll: logical lines
      # -ii: include low confidence

  frontend-security:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'
    - name: Install Node.js dependencies
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    # --- SNYK SCAN DISABLED ---
    # - name: Snyk Node.js Test
    #   uses: snyk/actions/node@master # Using snyk action for node.js
    #   env:
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    #   with:
    #     args: --file=frontend/package.json --severity-threshold=high --sarif-file-output=snyk-javascript.sarif
    #   continue-on-error: true

    # - name: Upload Snyk Node.js results to GitHub Code Scanning
    #   uses: github/codeql-action/upload-sarif@v4
    #   with:
    #     sarif_file: snyk-javascript.sarif
    #   if: ${{ always() && hashFiles('snyk-javascript.sarif') != '' }}

  container-security:
    name: Container Image Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Scan Dockerfile
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: deploy/Dockerfile
