apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-web
  template:
    metadata:
      labels:
        app: django-web
    spec:
      containers:
      - name: web
        image: animetix/backend:latest
        ports:
        - containerPort: 7860
        envFrom:
        - secretRef:
            name: animetix-secrets
        resources:
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /admin/login/
            port: 7860
---
apiVersion: v1
kind: Service
metadata:
  name: django-web
spec:
  selector:
    app: django-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
