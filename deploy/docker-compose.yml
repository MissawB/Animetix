# ==============================================================================
# Animetix - Infrastructure Docker Compose (SOTA 2026)
# ==============================================================================

services:
  # 🌐 Backend Django (API Headless)
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: animetix-backend
    command: python backend/api/manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - chromadb
      - neo4j

  # 🐘 Base de données Relationnelle (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: animetix-db
    environment:
      - POSTGRES_DB=animetix
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ⚡ Cache & WebSockets (Redis)
  redis:
    image: redis:7-alpine
    container_name: animetix-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # 🔎 Base de données Vectorielle (ChromaDB)
  chromadb:
    image: chromadb/chroma:latest
    container_name: animetix-chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8002:8000"
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS=animetix:animetix
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.basic.BasicAuthProvider

  # 🕸️ Graphe de Connaissances (Neo4j)
  neo4j:
    image: neo4j:5.20-enterprise
    container_name: animetix-neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc", "gds"]
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"

  # 🐏 Orchestration de Pipeline (Dagster)
  dagster:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: animetix-dagster
    command: dagster dev -f backend/pipeline/dagster_app.py -h 0.0.0.0 -p 3000
    volumes:
      - ..:/app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  # 🐏 Serveur d'Inférence Local (Ollama)
  ollama:
    profiles: ["llm"]
    image: ollama/ollama:latest
    container_name: animetix-ollama
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  data_volume:
  postgres_data:
  redis_data:
  chroma_data:
  neo4j_data:
  ollama_storage:
