# Build + push the DEV container image to Artifact Registry.
#
# Invoked by the promote-to-dev CI job:
#   gcloud builds submit --config deploy/cloudbuild.dev.yaml --substitutions=_TAG=<sha> .
#
# The Cloud Run deploy itself runs in the CI job (see .github/workflows/ci.yml),
# from the web-dev:<sha> image this build produces. Mirrors deploy/cloudbuild.yaml
# (prod) but targets a separate web-dev image so dev and prod never share a tag.
substitutions:
  _TAG: latest

steps:
  # Warm the layer cache from the last dev image (no-op on the very first build).
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:latest || true'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:latest'
      - '-t'
      - 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:${_TAG}'
      - '-t'
      - 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:latest'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

images:
  - 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:${_TAG}'
  - 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web-dev:latest'

options:
  machineType: 'E2_HIGHCPU_8'
timeout: '3600s'
