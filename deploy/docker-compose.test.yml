services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    command: "--host 0.0.0.0 --port 8000"

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
