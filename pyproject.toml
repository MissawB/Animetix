[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]  # Handled by black; strings/comments intentionally left long

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
# Force wandb as third-party: a local gitignored `wandb/` runtime dir otherwise
# makes ruff auto-detect it as first-party locally but not in CI (clean checkout),
# causing I001 to pass locally yet fail in CI.
known-third-party = ["wandb"]

[tool.mypy]
python_version = "3.12"
# `backend/` is the source root: code imports `from core...`, `from adapters...`.
# explicit_package_bases + running mypy with cwd=backend makes module names
# resolve as `core.x` (not `backend.core.x`), avoiding "source file found twice".
explicit_package_bases = true
namespace_packages = true
# CI lint job installs only mypy (no heavy ML deps), so third-party imports have
# no stubs available — treat them as Any rather than failing.
ignore_missing_imports = true
follow_imports = "silent"
warn_return_any = false
warn_unused_configs = true

# --- Type-debt baseline ---------------------------------------------------
# Modules below are not yet type-clean. They are still parsed (so imports
# resolve) but their errors are non-fatal.
# Burn this list down over time; do NOT add new modules to it.
# Progress: 105 -> 21 modules (84 burned down; ~141 errors remain across the 21).
[[tool.mypy.overrides]]
ignore_errors = true
module = [
    "adapters.inference.clip_vision",
    "adapters.inference.fallback_adapter",
    "adapters.inference.google_genai_adapter",
    "adapters.inference.local_text_adapter",
    "adapters.inference.moondream_adapter",
    "adapters.inference.unified_inference_adapter",
    "api.animetix.admin",
    "api.animetix_project.settings",
    "core.domain.services.advanced_vision_service",
    "core.domain.services.agentic_rag_service",
    "core.domain.services.akinetix_engine",
    "core.domain.services.emoji_service",
    "core.domain.services.health_dashboard_service",
    "core.domain.services.llm_service",
    "core.domain.services.paradox_service",
    "core.domain.services.tree_of_thoughts_service",
    "core.utils.lazy_import",
    "pipeline.evaluation.eval_ragas",
    "pipeline.mlops.dpo_dataset_compiler",
    "pipeline.mlops.ft_dataset.*",
    "pipeline.mlops.lore_ingestion_beam",
]

[tool.coverage.run]
source = ["backend"]
omit = [
    "**/tests/*",
    "**/migrations/*",
    "**/animetix_project/settings.py",
    "**/animetix_project/test_settings.py",
    "**/wsgi.py",
    "**/asgi.py",
    "**/manage.py",
]

[tool.coverage.report]
fail_under = 75
show_missing = true

