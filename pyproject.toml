[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "TID251"]
ignore = ["E501"]  # Handled by black; strings/comments intentionally left long

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"backend" = { msg = "Racine canonique nue : importez animetix/core/adapters/pipeline/scripts directement (docs/plans/2026-07-05-unify-import-namespace-design.md)." }
"src" = { msg = "Le namespace 'src' n'existe plus : importez pipeline.* directement." }

[tool.ruff.lint.per-file-ignores]
# Dans backend/, ruff résout les imports RELATIFS en chemins absolus backend.*
# (backend/__init__.py existe) → le ban TID251 y produirait des faux positifs.
# La protection y est assurée par le garde levant backend/__init__.py et par
# tests/test_import_hygiene.py ; le ban ruff reste actif pour tests/ et scripts/.
"backend/**" = ["TID251"]

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
# Force wandb as third-party: a local gitignored `wandb/` runtime dir otherwise
# makes ruff auto-detect it as first-party locally but not in CI (clean checkout),
# causing I001 to pass locally yet fail in CI.
known-third-party = ["wandb"]

[tool.mypy]
python_version = "3.12"
# `backend/` is the source root: code imports `from core...`, `from adapters...`.
# explicit_package_bases + running mypy with cwd=backend makes module names
# resolve as `core.x` (not `backend.core.x`), avoiding "source file found twice".
explicit_package_bases = true
namespace_packages = true
# CI lint job installs only mypy (no heavy ML deps), so third-party imports have
# no stubs available — treat them as Any rather than failing.
ignore_missing_imports = true
follow_imports = "silent"
warn_return_any = false
warn_unused_configs = true

# --- Type-debt baseline: CLEARED ------------------------------------------
# `cd backend && mypy .` is fully green with NO per-module `ignore_errors`
# overrides (the baseline went 105 -> 0 modules). Keep it that way: fix type
# errors at the source rather than re-introducing an ignore list. The few
# unavoidable dynamic spots (lazy-import module proxy, a Django logging filter)
# carry targeted `# type: ignore[<code>]` comments explaining why.

[tool.coverage.run]
source = ["backend"]
omit = [
    "**/tests/*",
    "**/migrations/*",
    "**/animetix_project/settings.py",
    "**/animetix_project/test_settings.py",
    "**/wsgi.py",
    "**/asgi.py",
    "**/manage.py",
]

[tool.coverage.report]
# Kept in lockstep with --cov-fail-under in .github/workflows/ci.yml (ratchet).
fail_under = 76
show_missing = true

