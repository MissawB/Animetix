[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]  # Handled by black; strings/comments intentionally left long

[tool.ruff.lint.isort]
combine-as-imports = true
force-single-line = false
# Force wandb as third-party: a local gitignored `wandb/` runtime dir otherwise
# makes ruff auto-detect it as first-party locally but not in CI (clean checkout),
# causing I001 to pass locally yet fail in CI.
known-third-party = ["wandb"]
