# Hooks Git locaux, alignés sur les jobs CI.
#
#   - pre-commit (rapide, à chaque commit) :
#     - ruff + black sur les fichiers Python stagés.
#     - lint-staged (eslint + prettier + check-types) sur les fichiers frontend stagés.
#   - pre-push  (plus lourd, avant push)   :
#     - mypy (type-debt baseline)
#     - pytest (tests unitaires, avec barrière de couverture backend >= 76%)
#     - vitest (tests unitaires frontend)
#
# Setup unique :
#   pip install pre-commit
#   pre-commit install            # installe pre-commit ET pre-push
#
# Lancer à la demande :
#   pre-commit run --all-files                     # hooks pre-commit
#   pre-commit run --hook-stage pre-push --all-files
#
# Pour sauter ponctuellement un hook lent : SKIP=pytest git push
#
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: frontend-lint-staged
        name: frontend lint-staged (eslint + prettier + check-types)
        entry: python scripts/run_cmd.py --cwd frontend npx lint-staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: mypy
        name: mypy (backend, type-debt baseline — miroir CI)
        entry: python scripts/run_in_venv.py --cwd backend -m mypy . --config-file ../pyproject.toml --no-site-packages
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest (tests unitaires, barrière couverture 76% — miroir CI)
        # Gate kept in lockstep with ci.yml + pyproject.toml — enforced by
        # tests/deploy/test_coverage_gate.py; bump the three together.
        entry: python scripts/run_in_venv.py -m pytest -m "not integration" --cov=backend --cov-fail-under=76 --cov-report=term-missing --cov-report=xml
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-vitest
        name: vitest (tests unitaires frontend — miroir CI)
        entry: python scripts/run_cmd.py --cwd frontend npm run test:coverage
        language: system
        pass_filenames: false
        stages: [pre-push]
