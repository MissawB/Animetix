# Unified Cloud Build config file supporting multi-target selective builds.
# Set _BUILD_TARGET to 'web', 'brain', 'dataflow', or 'all' (default).
substitutions:
  _TAG: latest
  _BUILD_TARGET: all
  # Config web Firebase — PUBLIQUE par design (elle est servie dans le bundle JS
  # à chaque visiteur ; la sécurité repose sur les domaines autorisés et les
  # règles Firebase, pas sur son secret). Elle vivait dans frontend/.env, exclu
  # du build depuis la remédiation secrets → sans ces substitutions, le bundle
  # prod sort sans config et toute l'authentification est gelée.
  _VITE_FIREBASE_API_KEY: "AIzaSyAKd1ysR9xyeMzoQnd_N9Yd2Rp1FWP-gPE"
  _VITE_FIREBASE_AUTH_DOMAIN: "animetix.firebaseapp.com"
  _VITE_FIREBASE_PROJECT_ID: "animetix"
  _VITE_FIREBASE_STORAGE_BUCKET: "animetix.firebasestorage.app"
  _VITE_FIREBASE_MESSAGING_SENDER_ID: "836616987676"
  _VITE_FIREBASE_APP_ID: "1:836616987676:web:f8933f68d908fa4b3b6bd9"
  _VITE_FIREBASE_MEASUREMENT_ID: "G-57H6132RP8"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # --- Web Image Build & Push ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-web'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_BUILD_TARGET}" = "all" ] || [ "${_BUILD_TARGET}" = "web" ]; then
          docker pull europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest || true
          docker build --pull \
            --cache-from europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest \
            --build-arg VITE_FIREBASE_API_KEY="${_VITE_FIREBASE_API_KEY}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${_VITE_FIREBASE_AUTH_DOMAIN}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${_VITE_FIREBASE_PROJECT_ID}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${_VITE_FIREBASE_STORAGE_BUCKET}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${_VITE_FIREBASE_MESSAGING_SENDER_ID}" \
            --build-arg VITE_FIREBASE_APP_ID="${_VITE_FIREBASE_APP_ID}" \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID="${_VITE_FIREBASE_MEASUREMENT_ID}" \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/web:${_TAG} \
            -f deploy/Dockerfile .
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/web:${_TAG}
        else
          echo "Skipping web build"
        fi

  # --- Brain Image Build & Push ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-brain'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_BUILD_TARGET}" = "all" ] || [ "${_BUILD_TARGET}" = "brain" ]; then
          docker build --pull \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/brain:latest \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/brain:${_TAG} \
            -f deploy/Dockerfile.brain .
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/brain:latest
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/brain:${_TAG}
        else
          echo "Skipping brain build"
        fi

  # --- Dataflow Image Build & Push ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-dataflow'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_BUILD_TARGET}" = "all" ] || [ "${_BUILD_TARGET}" = "dataflow" ]; then
          docker build --pull \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/lore-ingestion-beam:latest \
            -t europe-west9-docker.pkg.dev/animetix/animetix-repo/lore-ingestion-beam:${_TAG} \
            -f deploy/Dockerfile.dataflow .
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/lore-ingestion-beam:latest
          docker push europe-west9-docker.pkg.dev/animetix/animetix-repo/lore-ingestion-beam:${_TAG}
        else
          echo "Skipping dataflow build"
        fi

  # --- Dataflow Flex Template Build & Upload ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-flex-template'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ "${_BUILD_TARGET}" = "all" ] || [ "${_BUILD_TARGET}" = "dataflow" ]; then
          gcloud dataflow flex-template build \
            gs://animetix-dataflow/templates/lore-ingestion-beam.json \
            --image europe-west9-docker.pkg.dev/animetix/animetix-repo/lore-ingestion-beam:${_TAG} \
            --sdk-language PYTHON \
            --metadata-file deploy/lore_ingestion_metadata.json
        else
          echo "Skipping flex template build"
        fi
    waitFor: ['build-dataflow']
