# Build + push the prod container image to Artifact Registry.
# _TAG defaults to "latest" (backward compatible). The CI deploy-to-prod job
# passes _TAG=<commit sha> so the image is also tagged immutably and the deploy
# can pin that exact artifact instead of the mutable :latest tag.
substitutions:
  _TAG: latest

# Send build logs to Cloud Logging only (not the default GCS logs bucket).
# When `gcloud builds submit` runs as a service account (CI / Workload Identity
# Federation) rather than a human Viewer/Owner, it cannot stream logs from the
# default GCS bucket and exits non-zero EVEN IF THE BUILD SUCCEEDS. CLOUD_LOGGING_ONLY
# removes the GCS bucket from the picture so the command returns the build's real
# status. (Also the required logging mode for builds run as a user-specified SA.)
options:
  logging: CLOUD_LOGGING_ONLY

steps:
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker pull europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest || true
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    # `--pull` force la récupération de l'image de base la plus récente
    # (python:3.12-slim-bookworm) à CHAQUE build : sans ça, `--cache-from`
    # réutilise l'ancienne couche de base et les correctifs de sécurité Debian
    # (zlib, openssl, sqlite3, krb5…) ne sont jamais appliqués.
    '--pull',
    '--cache-from', 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest',
    '-t', 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest',
    '-t', 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web:${_TAG}',
    '-f', 'deploy/Dockerfile',
    '.'
  ]
images:
- 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web:latest'
- 'europe-west9-docker.pkg.dev/animetix/animetix-repo/web:${_TAG}'
